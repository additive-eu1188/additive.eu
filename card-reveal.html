<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>卡牌揭晓 · 完整流程</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* ... 所有样式保持不变 ... */
        /* （省略，与之前相同） */
    </style>
</head>
<body>

    <div id="effectLayer"></div>

    <div class="cards-grid" id="cardsGrid">
        <div class="card-item" id="card1">
            <div class="card-inner">
                <div class="card-aurora"></div>
                <div class="face face-front"><i class="fas fa-gem"></i><span>SELECT</span></div>
                <div class="face face-back">
                    <!-- 动态内容由 JavaScript 填充 -->
                    <div class="reward-icon"><i class="fas fa-gift"></i></div>
                    <div class="reward-amount">-</div>
                    <div class="reward-label">Loading...</div>
                </div>
            </div>
        </div>
        <div class="card-item" id="card2">
            <div class="card-inner">
                <div class="card-aurora"></div>
                <div class="face face-front"><i class="fas fa-gem"></i><span>SELECT</span></div>
                <div class="face face-back">
                    <div class="reward-icon"><i class="fas fa-gift"></i></div>
                    <div class="reward-amount">-</div>
                    <div class="reward-label">Loading...</div>
                </div>
            </div>
        </div>
        <div class="card-item" id="card3">
            <div class="card-inner">
                <div class="card-aurora"></div>
                <div class="face face-front"><i class="fas fa-gem"></i><span>SELECT</span></div>
                <div class="face face-back">
                    <div class="reward-icon"><i class="fas fa-gift"></i></div>
                    <div class="reward-amount">-</div>
                    <div class="reward-label">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="hint" id="hint"><i class="fas fa-mouse-pointer"></i> 点击任意卡牌翻开</div>

    <script>
        // ============================================================
        // 🔥 从 URL 参数读取配置
        // ============================================================
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                type: params.get('type') || 'reward',
                amount: parseFloat(params.get('amount')) || 0,
                triggerId: parseInt(params.get('triggerId')) || null,
                orderPrice: parseFloat(params.get('orderPrice')) || 0,
                orderCommission: parseFloat(params.get('orderCommission')) || 0,
                orderName: params.get('orderName') || 'Order'
            };
        }

        // 🔥 获取参数
        const urlParams = getUrlParams();

        // ============================================================
        // 🔥 动态更新卡牌背面内容
        // ============================================================
        function updateCardBacks() {
            const cards = [
                document.getElementById('card1'),
                document.getElementById('card2'),
                document.getElementById('card3')
            ];
            
            const type = urlParams.type;
            const amount = urlParams.amount;
            const orderPrice = urlParams.orderPrice;
            const orderCommission = urlParams.orderCommission;
            const orderName = urlParams.orderName || 'Order';
            
            let cardContents = [];
            
            if (type === 'reward') {
                // 卡牌奖励模式
                const amounts = [
                    amount,
                    Math.round(amount * 0.3),
                    Math.round(amount * 0.5)
                ];
                shuffleArray(amounts);
                
                // 确保第一个显示主要奖励
                if (amounts.length > 0 && amounts[0] !== amount) {
                    // 找到 amount 的位置
                    const idx = amounts.indexOf(amount);
                    if (idx > 0) {
                        [amounts[0], amounts[idx]] = [amounts[idx], amounts[0]];
                    }
                }
                
                cardContents = amounts.map((val, index) => ({
                    icon: 'fas fa-gift',
                    amount: '€' + val.toFixed(0),
                    label: index === 0 ? '⭐ Grand Prize' : '✨ Cash Reward'
                }));
                
            } else if (type === 'order') {
                // 卡牌订单模式
                cardContents = [
                    {
                        icon: 'fas fa-ticket-alt',
                        amount: 'x30',
                        label: 'COMMISSIONS'
                    },
                    {
                        icon: 'fas fa-gift',
                        amount: '€' + orderCommission.toFixed(0),
                        label: 'Commission Bonus'
                    },
                    {
                        icon: 'fas fa-hotel',
                        amount: '€' + orderPrice.toFixed(0),
                        label: orderName.length > 15 ? orderName.substring(0, 15) + '...' : orderName
                    }
                ];
            }
            
            // 更新卡牌
            cards.forEach((card, index) => {
                const backFace = card.querySelector('.face-back');
                if (backFace && cardContents[index]) {
                    const content = cardContents[index];
                    backFace.innerHTML = `
                        <div class="reward-icon"><i class="${content.icon}"></i></div>
                        <div class="reward-amount" style="color:#22d3ee;font-size:${content.amount.includes('x30') ? '28px' : '24px'};">${content.amount}</div>
                        <div class="reward-label" style="color:rgba(34,211,238,0.6);">${content.label}</div>
                    `;
                }
            });
        }

        // 🔥 辅助：打乱数组
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ============================================================
        // 完整流程：入场 + 点击翻牌
        // ============================================================
        let isPlaying = false;
        let isFlipped = false;
        let flipLock = false;
        let isWinner = false;

        const cards = [
            document.getElementById('card1'),
            document.getElementById('card2'),
            document.getElementById('card3')
        ];
        const effectLayer = document.getElementById('effectLayer');
        const hint = document.getElementById('hint');

        const COLORS = ['#64c8ff', '#22d3ee', '#4adeff', '#38bdf8', '#67e8f9', '#7dd3fc'];

        console.log('📋 卡牌页面参数:', urlParams);

        function random(min, max) { return Math.random() * (max - min) + min; }
        function randomInt(min, max) { return Math.floor(random(min, max + 1)); }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function clearParticles() {
            effectLayer.querySelectorAll('.particle, .burst-particle').forEach(el => el.remove());
        }

        function resetCards() {
            cards.forEach(c => {
                c.classList.remove('show', 'flipped', 'flipping', 'returning', 'dim', 'dim-other');
                c.style.transition = 'none';
                c.style.opacity = '0';
                c.style.transform = 'scale(0.3) rotateY(90deg)';
                c.style.pointerEvents = 'none';
                c.style.position = 'relative';
                c.style.left = 'auto';
                c.style.top = 'auto';
                c.style.zIndex = 'auto';
                c.style.filter = 'none';
                c.querySelector('.card-inner').style.animation = 'none';
            });
        }

        // ============================================================
        // 入场动画
        // ============================================================
        function createParticles(count) {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const fragment = document.createDocumentFragment();

            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = random(1.5, 5);
                const color = COLORS[randomInt(0, COLORS.length - 1)];

                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = color;
                p.style.setProperty('--color', color);
                p.style.boxShadow = `0 0 ${size * 3}px ${color}40`;
                p.style.left = cx + 'px';
                p.style.top = cy + 'px';

                const startX = random(0, window.innerWidth);
                const startY = random(0, window.innerHeight);
                p.style.setProperty('--sx', (startX - cx) + 'px');
                p.style.setProperty('--sy', (startY - cy) + 'px');

                const burstAngle = random(0, Math.PI * 2);
                const burstDist = random(100, Math.max(window.innerWidth, window.innerHeight) * 0.85);
                p.style.setProperty('--bx', Math.cos(burstAngle) * burstDist + 'px');
                p.style.setProperty('--by', Math.sin(burstAngle) * burstDist + 'px');

                p.style.setProperty('--duration', random(1.0, 2.5) + 's');
                p.style.animationDelay = random(0, 0.4) + 's';

                fragment.appendChild(p);
            }

            effectLayer.appendChild(fragment);
            return effectLayer.querySelectorAll('.particle');
        }

        async function playEntrance() {
            if (isPlaying) return;
            isPlaying = true;
            clearParticles();
            resetCards();
            isFlipped = false;
            flipLock = false;
            isWinner = false;
            hint.classList.remove('show');

            const particleCount = 200;
            const particles = createParticles(particleCount);

            await sleep(100);
            const batchSize = 25;
            for (let i = 0; i < particles.length; i += batchSize) {
                setTimeout(() => {
                    for (let j = i; j < Math.min(i + batchSize, particles.length); j++) {
                        particles[j].classList.add('condense');
                    }
                }, i * 1.5);
            }

            await sleep(1400);

            cards.forEach((card, idx) => {
                setTimeout(() => {
                    card.style.transition = 'all 1.2s cubic-bezier(0.15, 0.9, 0.25, 1.1)';
                    card.style.opacity = '1';
                    card.style.transform = 'scale(1) rotateY(0deg)';
                    card.style.pointerEvents = 'auto';
                    card.classList.add('show');
                }, idx * 180 + 300);
            });

            await sleep(400);

            particles.forEach((p, i) => {
                const delay = i * 1.2 + 100;
                setTimeout(() => {
                    p.classList.remove('condense');
                    p.classList.add('burst');
                    const angle = random(0, Math.PI * 2);
                    const dist = random(120, Math.max(window.innerWidth, window.innerHeight) * 0.85);
                    p.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
                    p.style.setProperty('--by', Math.sin(angle) * dist + 'px');
                    p.style.setProperty('--duration', random(0.8, 1.8) + 's');
                }, delay);
            });

            await sleep(1800);

            particles.forEach((p, i) => {
                const delay = i * 1.2 + 100;
                setTimeout(() => {
                    p.classList.remove('burst');
                    p.classList.add('star');
                    p.style.setProperty('--duration', random(2, 4) + 's');
                    p.style.animationDelay = random(0, 0.8) + 's';
                    p.style.opacity = '1';
                }, delay);
            });

            await sleep(600);
            hint.classList.add('show');
            isPlaying = false;
        }

        // ============================================================
        // 点击翻牌
        // ============================================================
        async function handleCardFlip(card) {
            if (flipLock || isPlaying || isFlipped) return;
            flipLock = true;
            isFlipped = true;
            isWinner = true;
            hint.classList.remove('show');

            const rect = card.getBoundingClientRect();
            const cx = window.innerWidth / 2 - rect.width / 2;
            const cy = window.innerHeight / 2 - rect.height / 2;

            const otherCards = cards.filter(c => c !== card);
            otherCards.forEach(c => {
                c.classList.add('dim-other');
            });

            card.classList.add('flipping');
            card.style.left = cx + 'px';
            card.style.top = cy + 'px';

            await sleep(700);

            const cx2 = window.innerWidth / 2;
            const cy2 = window.innerHeight / 2;
            const burstCount = 120;

            for (let i = 0; i < burstCount; i++) {
                const p = document.createElement('div');
                p.className = 'burst-particle';
                const size = random(2, 8);
                const color = COLORS[randomInt(0, COLORS.length - 1)];
                const angle = random(0, Math.PI * 2);
                const dist = random(80, 450);

                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = color;
                p.style.boxShadow = `0 0 ${size * 5}px ${color}60`;
                p.style.left = cx2 + 'px';
                p.style.top = cy2 + 'px';
                p.style.setProperty('--ex', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ey', Math.sin(angle) * dist + 'px');
                p.style.setProperty('--duration', random(0.5, 1.2) + 's');
                p.style.animationDelay = random(0, 0.15) + 's';

                p.addEventListener('animationend', function() {
                    this.remove();
                });

                effectLayer.appendChild(p);
                setTimeout(() => p.classList.add('active'), 30);
            }

            await sleep(500);

            card.classList.remove('flipping');
            card.classList.add('returning');
            card.style.left = rect.left + 'px';
            card.style.top = rect.top + 'px';

            await sleep(800);

            card.classList.remove('returning');
            card.style.position = 'relative';
            card.style.left = 'auto';
            card.style.top = 'auto';
            card.style.zIndex = 'auto';
            card.style.transition = 'none';
            card.classList.add('flipped');

            for (let i = 0; i < otherCards.length; i++) {
                await sleep(350);
                otherCards[i].classList.remove('dim-other');
                otherCards[i].classList.add('flipped');
            }

            flipLock = false;

            setTimeout(() => {
                if (window.parent !== window) {
                    const messageData = {
                        action: 'cardRevealComplete',
                        isWinner: isWinner,
                        triggerId: urlParams.triggerId,
                        amount: urlParams.amount,
                        type: urlParams.type,
                        orderPrice: urlParams.orderPrice,
                        orderCommission: urlParams.orderCommission,
                        orderName: urlParams.orderName
                    };
                    console.log('📤 发送消息到父页面:', messageData);
                    window.parent.postMessage(messageData, '*');
                } else {
                    console.log('⚠️ 不在 iframe 中');
                    alert('🎉 卡牌已翻开！\n奖励: €' + urlParams.amount.toFixed(2));
                }
            }, 500);
        }

        // ============================================================
        // 绑定事件
        // ============================================================
        cards.forEach(card => {
            card.addEventListener('click', function(e) {
                e.stopPropagation();
                handleCardFlip(this);
            });
        });

        // ============================================================
        // 窗口自适应
        // ============================================================
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (!isPlaying && !isFlipped) {
                    playEntrance();
                }
            }, 600);
        });

        // ============================================================
        // 初始化
        // ============================================================
        setTimeout(() => {
            // 🔥 先更新卡牌内容
            updateCardBacks();
            // 再播放入场动画
            playEntrance();
        }, 300);

        console.log('✅ 完整卡牌流程已加载 (动态内容)');
        console.log('   📍 类型: ' + urlParams.type);
        console.log('   📍 奖励金额: €' + urlParams.amount);
        console.log('   📍 触发ID: ' + urlParams.triggerId);
    </script>
</body>
</html>
