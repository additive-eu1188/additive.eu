<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>卡牌揭晓 · 完整流程</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* ===== 你的原始样式保持不变 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #070b1e;
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            position: relative;
        }
        @keyframes auroraSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes shakeFlip {
            0% { transform: rotateY(0deg); }
            20% { transform: rotateY(-20deg) scale(1.02); }
            40% { transform: rotateY(15deg) scale(1.04); }
            60% { transform: rotateY(-10deg) scale(1.06); }
            80% { transform: rotateY(5deg) scale(1.08); }
            100% { transform: rotateY(180deg) scale(1.1); }
        }
        #effectLayer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none !important;
            z-index: 5;
            overflow: visible;
        }
        #effectLayer * { pointer-events: none !important; }
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            will-change: transform, opacity;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            opacity: 0;
        }
        .particle.condense {
            animation: condenseIn var(--duration) cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }
        @keyframes condenseIn {
            0% { opacity: 1; transform: translate3d(var(--sx), var(--sy), 0) scale(0.1); }
            100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
        }
        .particle.burst {
            animation: burstOut var(--duration) cubic-bezier(0.15, 0.85, 0.3, 1) forwards;
        }
        @keyframes burstOut {
            0% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
            100% { opacity: 1; transform: translate3d(var(--bx), var(--by), 0) scale(0.3); }
        }
        .particle.star {
            animation: starTwinkle var(--duration) ease-in-out infinite alternate;
            opacity: 1 !important;
        }
        @keyframes starTwinkle {
            0% { opacity: 0; transform: translate3d(var(--bx), var(--by), 0) scale(0.2); box-shadow: none; }
            100% { opacity: 1; transform: translate3d(var(--bx), var(--by), 0) scale(1.2); box-shadow: 0 0 20px var(--color), 0 0 40px var(--color); }
        }
        .burst-particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 6;
            will-change: transform, opacity;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            opacity: 0;
        }
        .burst-particle.active {
            animation: burstExplode var(--duration) cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }
        @keyframes burstExplode {
            0% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
            100% { opacity: 0; transform: translate3d(var(--ex), var(--ey), 0) scale(0); }
        }
        .cards-grid {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 700px;
            padding: 20px;
            position: relative;
            z-index: 100;
        }
        .card-item {
            width: 180px;
            height: 250px;
            perspective: 2000px;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            border-radius: 24px;
            opacity: 0;
            transform: scale(0.3) rotateY(90deg);
            transition: none;
            pointer-events: none;
            will-change: transform, opacity;
        }
        .card-item.show {
            opacity: 1;
            transform: scale(1) rotateY(0deg);
            pointer-events: auto;
            transition: all 1.2s cubic-bezier(0.15, 0.9, 0.25, 1.1);
        }
        .card-item .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            border-radius: 24px;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
        }
        .card-aurora {
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 26px;
            background: conic-gradient(from 0deg,
                    transparent,
                    rgba(34, 211, 238, 0.2),
                    transparent,
                    rgba(100, 200, 255, 0.15),
                    transparent,
                    rgba(34, 211, 238, 0.2),
                    transparent);
            animation: auroraSpin 6s linear infinite;
            pointer-events: none;
            z-index: 0;
            padding: 2px;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
        }
        .face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            border-radius: 24px;
        }
        .face-front {
            background: linear-gradient(145deg, #0a0a2a, #1a0a2a, #0a2a2a);
            border: 1px solid rgba(34, 211, 238, 0.08);
            transform: rotateY(0deg);
        }
        .face-front i {
            font-size: 40px;
            color: #22d3ee;
            margin-bottom: 12px;
            text-shadow: 0 0 40px rgba(34, 211, 238, 0.15);
        }
        .face-front span {
            font-size: 12px;
            color: rgba(34, 211, 238, 0.4);
            letter-spacing: 2px;
        }
        .face-back {
            background: linear-gradient(145deg, #0a2a1a, #1a3a2a);
            border: 1px solid rgba(34, 211, 238, 0.2);
            transform: rotateY(180deg);
        }
        .face-back .reward-icon {
            font-size: 36px;
            color: #22d3ee;
            margin-bottom: 6px;
        }
        .face-back .reward-amount {
            font-size: 24px;
            font-weight: 800;
            color: #22d3ee;
        }
        .face-back .reward-label {
            font-size: 11px;
            color: rgba(34, 211, 238, 0.6);
            letter-spacing: 1.5px;
            margin-top: 4px;
        }
        .card-item.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-item.flipping {
            position: fixed !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) scale(1.8) !important;
            z-index: 200 !important;
            pointer-events: none !important;
            opacity: 1 !important;
            transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) !important;
        }
        .card-item.flipping .card-inner {
            animation: shakeFlip 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .card-item.returning {
            position: fixed !important;
            z-index: 200 !important;
            pointer-events: none !important;
            opacity: 1 !important;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .card-item.returning .card-inner {
            transform: rotateY(180deg);
        }
        .card-item.dim {
            filter: grayscale(0.8) brightness(0.4);
            opacity: 0.5 !important;
            pointer-events: none !important;
            transition: filter 0.8s ease, opacity 0.8s ease;
        }
        .card-item.flipped.dim {
            filter: none;
            opacity: 1 !important;
        }
        .card-item.dim-other {
            filter: grayscale(0.9) brightness(0.3);
            opacity: 0.3 !important;
            pointer-events: none !important;
            transition: filter 0.6s ease, opacity 0.6s ease;
        }
        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-size: 12px;
            color: #4a5a7a;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.6s;
        }
        .hint.show { opacity: 1; }
        @media (max-width: 600px) {
            .cards-grid { gap: 12px; padding: 10px; }
            .card-item { width: 130px; height: 180px; }
        }
        @media (max-width: 400px) {
            .card-item { width: 100px; height: 140px; }
            .cards-grid { gap: 8px; padding: 6px; }
        }
    </style>
</head>
<body>

    <div id="effectLayer"></div>

    <div class="cards-grid" id="cardsGrid"></div>

    <div class="hint" id="hint"><i class="fas fa-mouse-pointer"></i> 点击任意卡牌翻开</div>

    <script>
        // ============================================================
        // 🔥 从 URL 读取后台设置
        // ============================================================
        function getParams() {
            const url = new URL(window.location.href);
            return {
                type: url.searchParams.get('type') || 'reward',
                amount: parseFloat(url.searchParams.get('amount')) || 0,
                triggerId: parseInt(url.searchParams.get('triggerId')) || 0,
                orderPrice: parseFloat(url.searchParams.get('orderPrice')) || 0,
                orderCommission: parseFloat(url.searchParams.get('orderCommission')) || 0,
                orderName: url.searchParams.get('orderName') || 'x30 Commissions Order'
            };
        }

        const params = getParams();
        const isReward = params.type === 'reward';

        // ============================================================
        // 🔥 渲染三张卡牌（全部显示后台设置的内容）
        // ============================================================
        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            let html = '';

            for (let i = 0; i < 3; i++) {
                let backHtml = '';
                if (isReward) {
                    backHtml = `
                        <div class="reward-icon"><i class="fas fa-gift"></i></div>
                        <div class="reward-amount">€${params.amount.toFixed(2)}</div>
                        <div class="reward-label">✨ Cash Reward</div>
                    `;
                } else {
                    backHtml = `
                        <div class="reward-icon"><i class="fas fa-hotel"></i></div>
                        <div class="reward-amount" style="font-size:20px;color:#ffdd99;">x30</div>
                        <div class="reward-label" style="font-size:12px;color:#C9B095;">COMMISSIONS</div>
                    `;
                }

                html += `
                    <div class="card-item" id="card${i + 1}" data-index="${i}" data-trigger-id="${params.triggerId}">
                        <div class="card-inner">
                            <div class="card-aurora"></div>
                            <div class="face face-front">
                                <i class="fas fa-gem"></i>
                                <span>SELECT</span>
                            </div>
                            <div class="face face-back">
                                ${backHtml}
                            </div>
                        </div>
                    </div>
                `;
            }

            grid.innerHTML = html;
        }

        renderCards();

        // ============================================================
        // 完整流程：入场 + 点击翻牌
        // ============================================================
        let isPlaying = false;
        let isFlipped = false;
        let flipLock = false;

        const cards = document.querySelectorAll('.card-item');
        const effectLayer = document.getElementById('effectLayer');
        const hint = document.getElementById('hint');

        const COLORS = ['#64c8ff', '#22d3ee', '#4adeff', '#38bdf8', '#67e8f9', '#7dd3fc'];

        function random(min, max) { return Math.random() * (max - min) + min; }
        function randomInt(min, max) { return Math.floor(random(min, max + 1)); }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function clearParticles() {
            effectLayer.querySelectorAll('.particle, .burst-particle').forEach(el => el.remove());
        }

        function resetCards() {
            cards.forEach(c => {
                c.classList.remove('show', 'flipped', 'flipping', 'returning', 'dim', 'dim-other');
                c.style.transition = 'none';
                c.style.opacity = '0';
                c.style.transform = 'scale(0.3) rotateY(90deg)';
                c.style.pointerEvents = 'none';
                c.style.position = 'relative';
                c.style.left = 'auto';
                c.style.top = 'auto';
                c.style.zIndex = 'auto';
                c.style.filter = 'none';
                c.querySelector('.card-inner').style.animation = 'none';
            });
        }

        // ============================================================
        // 入场动画（你的原始版本）
        // ============================================================
        function createParticles(count) {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const fragment = document.createDocumentFragment();

            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = random(1.5, 5);
                const color = COLORS[randomInt(0, COLORS.length - 1)];

                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = color;
                p.style.setProperty('--color', color);
                p.style.boxShadow = `0 0 ${size * 3}px ${color}40`;
                p.style.left = cx + 'px';
                p.style.top = cy + 'px';

                const startX = random(0, window.innerWidth);
                const startY = random(0, window.innerHeight);
                p.style.setProperty('--sx', (startX - cx) + 'px');
                p.style.setProperty('--sy', (startY - cy) + 'px');

                const burstAngle = random(0, Math.PI * 2);
                const burstDist = random(100, Math.max(window.innerWidth, window.innerHeight) * 0.85);
                p.style.setProperty('--bx', Math.cos(burstAngle) * burstDist + 'px');
                p.style.setProperty('--by', Math.sin(burstAngle) * burstDist + 'px');

                p.style.setProperty('--duration', random(1.0, 2.5) + 's');
                p.style.animationDelay = random(0, 0.4) + 's';

                fragment.appendChild(p);
            }

            effectLayer.appendChild(fragment);
            return effectLayer.querySelectorAll('.particle');
        }

        async function playEntrance() {
            if (isPlaying) return;
            isPlaying = true;
            clearParticles();
            resetCards();
            isFlipped = false;
            flipLock = false;
            hint.classList.remove('show');

            const particleCount = 200;
            const particles = createParticles(particleCount);

            await sleep(100);
            const batchSize = 25;
            for (let i = 0; i < particles.length; i += batchSize) {
                setTimeout(() => {
                    for (let j = i; j < Math.min(i + batchSize, particles.length); j++) {
                        particles[j].classList.add('condense');
                    }
                }, i * 1.5);
            }

            await sleep(1400);

            cards.forEach((card, idx) => {
                setTimeout(() => {
                    card.style.transition = 'all 1.2s cubic-bezier(0.15, 0.9, 0.25, 1.1)';
                    card.style.opacity = '1';
                    card.style.transform = 'scale(1) rotateY(0deg)';
                    card.style.pointerEvents = 'auto';
                    card.classList.add('show');
                }, idx * 180 + 300);
            });

            await sleep(400);

            particles.forEach((p, i) => {
                const delay = i * 1.2 + 100;
                setTimeout(() => {
                    p.classList.remove('condense');
                    p.classList.add('burst');
                    const angle = random(0, Math.PI * 2);
                    const dist = random(120, Math.max(window.innerWidth, window.innerHeight) * 0.85);
                    p.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
                    p.style.setProperty('--by', Math.sin(angle) * dist + 'px');
                    p.style.setProperty('--duration', random(0.8, 1.8) + 's');
                }, delay);
            });

            await sleep(1800);

            particles.forEach((p, i) => {
                const delay = i * 1.2 + 100;
                setTimeout(() => {
                    p.classList.remove('burst');
                    p.classList.add('star');
                    p.style.setProperty('--duration', random(2, 4) + 's');
                    p.style.animationDelay = random(0, 0.8) + 's';
                    p.style.opacity = '1';
                }, delay);
            });

            await sleep(600);
            hint.classList.add('show');
            isPlaying = false;
        }

        // ============================================================
        // 点击翻牌（你的原始逻辑 + 修复消息传递）
        // ============================================================
        async function handleCardFlip(card) {
            if (flipLock || isPlaying || isFlipped) return;
            flipLock = true;
            isFlipped = true;
            hint.classList.remove('show');

            const triggerId = parseInt(card.dataset.triggerId) || params.triggerId;

            const rect = card.getBoundingClientRect();
            const cx = window.innerWidth / 2 - rect.width / 2;
            const cy = window.innerHeight / 2 - rect.height / 2;

            const otherCards = Array.from(cards).filter(c => c !== card);
            otherCards.forEach(c => {
                c.classList.add('dim-other');
            });

            card.classList.add('flipping');
            card.style.left = cx + 'px';
            card.style.top = cy + 'px';

            await sleep(700);

            const cx2 = window.innerWidth / 2;
            const cy2 = window.innerHeight / 2;
            const burstCount = 120;

            for (let i = 0; i < burstCount; i++) {
                const p = document.createElement('div');
                p.className = 'burst-particle';
                const size = random(2, 8);
                const color = COLORS[randomInt(0, COLORS.length - 1)];
                const angle = random(0, Math.PI * 2);
                const dist = random(80, 450);

                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = color;
                p.style.boxShadow = `0 0 ${size * 5}px ${color}60`;
                p.style.left = cx2 + 'px';
                p.style.top = cy2 + 'px';
                p.style.setProperty('--ex', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ey', Math.sin(angle) * dist + 'px');
                p.style.setProperty('--duration', random(0.5, 1.2) + 's');
                p.style.animationDelay = random(0, 0.15) + 's';

                p.addEventListener('animationend', function() {
                    this.remove();
                });

                effectLayer.appendChild(p);
                setTimeout(() => p.classList.add('active'), 30);
            }

            await sleep(500);

            card.classList.remove('flipping');
            card.classList.add('returning');
            card.style.left = rect.left + 'px';
            card.style.top = rect.top + 'px';

            await sleep(800);

            card.classList.remove('returning');
            card.style.position = 'relative';
            card.style.left = 'auto';
            card.style.top = 'auto';
            card.style.zIndex = 'auto';
            card.style.transition = 'none';
            card.classList.add('flipped');

            for (let i = 0; i < otherCards.length; i++) {
                await sleep(350);
                otherCards[i].classList.remove('dim-other');
                otherCards[i].classList.add('flipped');
            }

            flipLock = false;

            // ============================================================
            // 🔥 发送消息给父页面（传递后台设置的内容）
            // ============================================================
            setTimeout(() => {
                if (window.parent !== window) {
                    const amount = isReward ? params.amount : params.orderCommission;
                    window.parent.postMessage({
                        action: 'cardRevealComplete',
                        isWinner: true,
                        triggerId: triggerId,
                        amount: amount,
                        type: isReward ? 'reward' : 'order'
                    }, '*');
                }
            }, 500);
        }

        // ============================================================
        // 绑定事件
        // ============================================================
        cards.forEach(card => {
            card.addEventListener('click', function(e) {
                e.stopPropagation();
                handleCardFlip(this);
            });
        });

        // ============================================================
        // 窗口自适应
        // ============================================================
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (!isPlaying && !isFlipped) {
                    playEntrance();
                }
            }, 600);
        });

        // ============================================================
        // 初始化
        // ============================================================
        setTimeout(() => {
            playEntrance();
        }, 300);

        console.log('✅ 卡牌揭晓已加载（后台设置内容 + 完整入场动画）');
        console.log('   📍 类型:', params.type);
        console.log('   📍 奖励金额: €' + params.amount);
        console.log('   📍 触发ID:', params.triggerId);
        console.log('   ✅ 三张卡牌都显示相同的后台设置内容');
    </script>
</body>
</html>
