<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>卡牌揭晓 · 完整流程</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #070b1e;
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        #effectLayer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none !important;
            z-index: 5;
            overflow: visible;
        }
        #effectLayer * { pointer-events: none !important; }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            will-change: transform, opacity;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            opacity: 0;
        }
        .particle.condense {
            animation: condenseIn var(--duration) cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }
        @keyframes condenseIn {
            0% { opacity: 1; transform: translate3d(var(--sx), var(--sy), 0) scale(0.1); }
            100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
        }
        .particle.burst {
            animation: burstOut var(--duration) cubic-bezier(0.15, 0.85, 0.3, 1) forwards;
        }
        @keyframes burstOut {
            0% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
            100% { opacity: 1; transform: translate3d(var(--bx), var(--by), 0) scale(0.3); }
        }
        .particle.star {
            animation: starTwinkle var(--duration) ease-in-out infinite alternate;
            opacity: 1 !important;
        }
        @keyframes starTwinkle {
            0% { opacity: 0; transform: translate3d(var(--bx), var(--by), 0) scale(0.2); box-shadow: none; }
            100% { opacity: 1; transform: translate3d(var(--bx), var(--by), 0) scale(1.2); box-shadow: 0 0 20px var(--color), 0 0 40px var(--color); }
        }

        #particleContainer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 99999;
            overflow: hidden;
        }
        .particle-star {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            will-change: transform, opacity;
        }
        .particle-star.active {
            animation: burstExplode var(--duration) cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }
        @keyframes burstExplode {
            0% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
            100% { opacity: 0; transform: translate3d(var(--ex), var(--ey), 0) scale(0); }
        }

        .cards-grid {
            display: flex;
            gap: 24px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            position: relative;
            z-index: 100;
        }

        /* ===== 卡牌容器 ===== */
        .card-wrapper {
            perspective: 1200px;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
        }
        .card-wrapper:hover {
            transform: translateY(-8px) rotateX(2deg) rotateY(-4deg);
        }
        .card-wrapper:hover .card-item {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(204, 178, 153, 0.08);
        }

        .card-item {
            width: 200px;
            height: 275px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 16px;
            position: relative;
            text-align: center;
            font-family: 'Inter', sans-serif;
            flex-shrink: 0;
            overflow: hidden;
            transform-style: preserve-3d;
            background: radial-gradient(ellipse at 50% 30%, #1e1630, #0a0612 70%);
            border: 1px solid rgba(204, 178, 153, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(204, 178, 153, 0.15),
                inset 0 -1px 0 rgba(0, 0, 0, 0.5), 0 0 30px rgba(204, 178, 153, 0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            transform: scale(0.3) rotateY(90deg);
            pointer-events: none;
            will-change: transform, opacity;
        }
        .card-item.show {
            opacity: 1;
            transform: scale(1) rotateY(0deg);
            pointer-events: auto;
            transition: all 1.2s cubic-bezier(0.15, 0.9, 0.25, 1.1);
        }

        .card-item .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-item.flipped .card-inner { transform: rotateY(180deg); }

        /* 正面 */
        .face-front {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            background: radial-gradient(ellipse at 50% 30%, #1e1630, #0a0612 70%);
            transform: rotateY(0deg);
        }
        .face-front i { font-size: 48px; color: #64c8ff; margin-bottom: 16px; text-shadow: 0 0 30px rgba(100, 200, 255, 0.2); }
        .face-front span { font-size: 13px; color: rgba(100, 200, 255, 0.5); letter-spacing: 2px; }

        /* 背面 */
        .face-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            transform: rotateY(180deg);
            padding: 20px 20px 16px;
            background: radial-gradient(ellipse at 50% 30%, #1e1630, #0a0612 70%);
        }

        /* 卡牌状态 */
        .card-item.dim {
            opacity: 0.5 !important;
            filter: grayscale(0.85) brightness(0.75) !important;
            transform: scale(0.9) !important;
            pointer-events: none !important;
            transition: all 0.5s !important;
        }
        .card-item.dim .card-inner { transform: scale(0.9) !important; }
        .card-item.dim.flipped .card-inner { transform: scale(0.9) rotateY(180deg) !important; }
        .card-item.dim-other {
            filter: grayscale(0.9) brightness(0.3);
            opacity: 0.3 !important;
            pointer-events: none !important;
            transition: filter 0.6s ease, opacity 0.6s ease;
        }

        /* 翻牌动画 */
        @keyframes shakeFlip {
            0% { transform: rotateY(0deg); }
            20% { transform: rotateY(-20deg) scale(1.02); }
            40% { transform: rotateY(15deg) scale(1.04); }
            60% { transform: rotateY(-10deg) scale(1.06); }
            80% { transform: rotateY(5deg) scale(1.08); }
            100% { transform: rotateY(180deg) scale(1.1); }
        }

        /* 🔥 修复：翻牌动画位置 */
        .card-item.flipping {
            position: fixed !important;
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%) scale(1.8) !important;
            z-index: 200 !important;
            pointer-events: none !important;
            opacity: 1 !important;
            transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) !important;
        }
        .card-item.flipping .card-inner {
            animation: shakeFlip 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .card-item.returning {
            position: fixed !important;
            z-index: 200 !important;
            pointer-events: none !important;
            opacity: 1 !important;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) !important;
        }
        .card-item.returning .card-inner {
            transform: rotateY(180deg);
        }

        /* 3D 装饰 */
        .card-item::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(204, 178, 153, 0.3) 0%, transparent 30%, transparent 70%, rgba(204, 178, 153, 0.1) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 30;
        }
        .card-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 40%;
            background: radial-gradient(ellipse at bottom, rgba(204, 178, 153, 0.06), transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .top-highlight {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: radial-gradient(ellipse at 30% 0%, rgba(204, 178, 153, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 1;
            border-radius: 24px 24px 0 0;
        }
        .side-light {
            position: absolute;
            right: 0;
            top: 10%;
            width: 2px;
            height: 80%;
            background: linear-gradient(180deg, transparent, rgba(204, 178, 153, 0.15), transparent);
            pointer-events: none;
            z-index: 1;
        }
        .side-light-left {
            position: absolute;
            left: 0;
            top: 10%;
            width: 2px;
            height: 80%;
            background: linear-gradient(180deg, transparent, rgba(204, 178, 153, 0.05), transparent);
            pointer-events: none;
            z-index: 1;
        }

        /* 玻璃反光 */
        .glass-shine {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(135deg,
                    transparent 35%,
                    rgba(255, 255, 255, 0.12) 45%,
                    rgba(255, 255, 255, 0.35) 50%,
                    rgba(255, 255, 255, 0.12) 55%,
                    transparent 65%);
            transform: rotate(25deg) translateX(-100%);
            pointer-events: none;
            z-index: 20;
            animation: glassSweep 4.5s ease-in-out infinite;
        }
        .glass-shine-soft {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(135deg,
                    transparent 40%,
                    rgba(255, 255, 255, 0.04) 48%,
                    rgba(255, 255, 255, 0.12) 50%,
                    rgba(255, 255, 255, 0.04) 52%,
                    transparent 60%);
            transform: rotate(25deg) translateX(-100%);
            pointer-events: none;
            z-index: 19;
            animation: glassSweep 5.5s ease-in-out infinite 0.6s;
        }
        @keyframes glassSweep {
            0% { transform: rotate(25deg) translateX(-100%); }
            40% { transform: rotate(25deg) translateX(50%); }
            60% { transform: rotate(25deg) translateX(50%); }
            100% { transform: rotate(25deg) translateX(200%); }
        }

        .shield-bg {
            position: absolute;
            width: 120px;
            height: 140px;
            border: 1px solid rgba(204, 178, 153, 0.04);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform: rotate(45deg);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 背面内容 ===== */
        .icon { font-size: 40px; margin-bottom: 12px; color: #E8D5B8; filter: drop-shadow(0 0 8px rgba(204, 178, 153, 0.15)); z-index: 2; position: relative; }
        .amount { font-size: 44px; font-weight: 800; color: #E8D5B8; text-shadow: 0 0 12px rgba(204, 178, 153, 0.15); line-height: 1.1; margin-bottom: 2px; z-index: 2; position: relative; }
        .amount.x30 { font-size: 48px; letter-spacing: 2px; }
        .divider-line { width: 40px; height: 2px; margin: 10px 0 8px; background: linear-gradient(90deg, transparent, #CCB299, transparent); box-shadow: 0 0 8px rgba(204, 178, 153, 0.15); z-index: 2; position: relative; }
        .label { font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600; color: #CCB299; z-index: 2; position: relative; }
        .stars { color: #CCB299; font-size: 10px; letter-spacing: 4px; margin-top: 6px; opacity: 0.4; z-index: 2; position: relative; }
        .bottom-tag { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: 600; padding: 3px 10px; border-radius: 20px; z-index: 5; letter-spacing: 0.5px; background: rgba(204, 178, 153, 0.08); color: #CCB299; border: 1px solid rgba(204, 178, 153, 0.08); }
        .bottom-tag i { margin-right: 4px; }

        .overlay-blur {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(14px);
            z-index: 9998;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .overlay-blur.active { opacity: 1; pointer-events: auto; }

        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            font-size: 12px;
            color: #4a5a7a;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.6s;
        }
        .hint.show { opacity: 1; }

        @media (max-width: 768px) {
            .cards-grid { gap: 16px; padding: 10px; }
            .card-item { width: 150px !important; height: 210px !important; }
            .icon { font-size: 32px; }
            .amount { font-size: 32px; }
            .amount.x30 { font-size: 36px; }
            .bottom-tag { font-size: 8px; padding: 2px 8px; bottom: 10px; }
        }
        @media (max-width: 480px) {
            .cards-grid { gap: 8px; padding: 6px; }
            .card-item { width: 120px !important; height: 170px !important; }
            .icon { font-size: 24px; }
            .amount { font-size: 24px; }
            .amount.x30 { font-size: 28px; }
            .bottom-tag { font-size: 7px; padding: 2px 6px; bottom: 8px; }
        }
    </style>
</head>
<body>

    <div id="effectLayer"></div>
    <div class="cards-grid" id="cardsGrid"></div>
    <div id="particleContainer"></div>
    <div class="overlay-blur" id="overlayBlur"></div>
    <div class="hint" id="hint"><i class="fas fa-mouse-pointer"></i> 点击任意卡牌翻开</div>

    <script>
        // ============================================================
        // 通用工具
        // ============================================================
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        // ============================================================
        // 读取 URL 参数
        // ============================================================
        function getParams() {
            const url = new URL(window.location.href);
            return {
                type: url.searchParams.get('type') || 'reward',
                amount: parseFloat(url.searchParams.get('amount')) || 0,
                triggerId: parseInt(url.searchParams.get('triggerId')) || 0,
                orderPrice: parseFloat(url.searchParams.get('orderPrice')) || 0,
                orderCommission: parseFloat(url.searchParams.get('orderCommission')) || 0,
                orderName: url.searchParams.get('orderName') || 'x30 Commissions Order'
            };
        }

        const params = getParams();
        const isReward = params.type === 'reward';

        // ============================================================
        // 生成随机金额（不等于固定值）
        // ============================================================
        const randomMin = 5;
        const randomMax = 200;

        function generateRandomAmount(exclude) {
            let amt;
            let attempts = 0;
            do {
                amt = Math.floor(Math.random() * (randomMax - randomMin + 1)) + randomMin;
                attempts++;
            } while (amt === exclude && attempts < 30);
            return amt;
        }

        // ============================================================
        // 固定内容（后台设置）
        // ============================================================
        let fixedAmount, fixedLabel, fixedIcon;
        if (isReward) {
            fixedAmount = '€' + params.amount.toFixed(2);
            fixedLabel = '✨ Cash Reward';
            fixedIcon = 'fas fa-gift';
        } else {
            fixedAmount = 'x30';
            fixedLabel = 'COMMISSIONS';
            fixedIcon = 'fas fa-hotel';
        }

        // ============================================================
        // 生成两个随机值（不等于固定值）
        // ============================================================
        let random1, random2;
        if (isReward) {
            const r1 = generateRandomAmount(params.amount);
            const r2 = generateRandomAmount(params.amount);
            random1 = { amount: '€' + r1.toFixed(2), label: '✨ Cash Reward', icon: 'fas fa-gift' };
            random2 = { amount: '€' + r2.toFixed(2), label: '✨ Cash Reward', icon: 'fas fa-gift' };
        } else {
            const r1 = generateRandomAmount(params.orderPrice);
            const r2 = generateRandomAmount(params.orderPrice);
            random1 = { amount: '€' + r1.toFixed(2), label: '✨ Cash Reward', icon: 'fas fa-gift' };
            random2 = { amount: '€' + r2.toFixed(2), label: '✨ Cash Reward', icon: 'fas fa-gift' };
        }

        // ============================================================
        // 渲染三张卡牌
        // ============================================================
        const grid = document.getElementById('cardsGrid');
        let html = '';

        let cardData = [];
        if (isReward) {
            const fixed = params.amount;
            const r1 = generateRandomAmount(fixed);
            const r2 = generateRandomAmount(fixed);
            cardData = [
                { type: 'reward', amount: fixed, triggerId: params.triggerId, isMain: true },
                { type: 'reward', amount: r1, triggerId: params.triggerId, isMain: false },
                { type: 'reward', amount: r2, triggerId: params.triggerId, isMain: false }
            ];
        } else {
            const fixed = params.orderPrice;
            const r1 = generateRandomAmount(fixed);
            const r2 = generateRandomAmount(fixed);
            cardData = [
                { type: 'order', price: params.orderPrice, commission: params.orderCommission, name: params.orderName,
                    triggerId: params.triggerId, isMain: true },
                { type: 'reward', amount: r1, triggerId: params.triggerId, isMain: false },
                { type: 'reward', amount: r2, triggerId: params.triggerId, isMain: false }
            ];
        }

        for (let i = cardData.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cardData[i], cardData[j]] = [cardData[j], cardData[i]];
        }

        cardData.forEach((card, idx) => {
            let dataAttr = `data-index="${idx}" data-trigger-id="${card.triggerId}" data-is-main="${card.isMain}"`;
            let backHtml = '';

            if (card.type === 'reward') {
                backHtml = `
                    <div class="icon"><i class="fas fa-money-bill-wave"></i></div>
                    <div class="amount">${card.amount.toFixed(2)}</div>
                    <div class="divider-line"></div>
                    <div class="label">Cash Reward</div>
                    <div class="stars">✦ ✦ ✦ ✦ ✦</div>
                    <span class="bottom-tag"><i class="fas fa-tag"></i> Reward</span>
                `;
            } else if (card.type === 'order') {
                backHtml = `
                    <div class="icon"><i class="fas fa-ticket-alt"></i></div>
                    <div class="amount x30">x30</div>
                    <div class="divider-line"></div>
                    <div class="label">COMMISSIONS</div>
                    <div class="stars">✦ ✦ ✦ ✦ ✦</div>
                    <span class="bottom-tag"><i class="fas fa-tag"></i> Order</span>
                `;
            }

            html += `
                <div class="card-wrapper">
                    <div class="card-item" id="card${idx + 1}" ${dataAttr}>
                        <div class="card-inner">
                            <div class="top-highlight"></div>
                            <div class="side-light"></div>
                            <div class="side-light-left"></div>
                            <div class="glass-shine"></div>
                            <div class="glass-shine-soft"></div>
                            <div class="shield-bg"></div>
                            <div class="face face-front">
                                <i class="fas fa-gem"></i>
                                <span>SELECT</span>
                            </div>
                            <div class="face face-back">
                                ${backHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;

        // ============================================================
        // 入场粒子系统（完全保留原样）
        // ============================================================
        const effectLayer = document.getElementById('effectLayer');
        const COLORS = ['#64c8ff', '#22d3ee', '#4adeff', '#38bdf8', '#67e8f9', '#7dd3fc'];

        function random(min, max) { return Math.random() * (max - min) + min; }
        function randomInt(min, max) { return Math.floor(random(min, max + 1)); }

        function createParticles(count) {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const fragment = document.createDocumentFragment();

            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = random(1.5, 5);
                const color = COLORS[randomInt(0, COLORS.length - 1)];

                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = color;
                p.style.setProperty('--color', color);
                p.style.boxShadow = `0 0 ${size * 3}px ${color}40`;
                p.style.left = cx + 'px';
                p.style.top = cy + 'px';

                const startX = random(0, window.innerWidth);
                const startY = random(0, window.innerHeight);
                p.style.setProperty('--sx', (startX - cx) + 'px');
                p.style.setProperty('--sy', (startY - cy) + 'px');

                const burstAngle = random(0, Math.PI * 2);
                const burstDist = random(100, Math.max(window.innerWidth, window.innerHeight) * 0.85);
                p.style.setProperty('--bx', Math.cos(burstAngle) * burstDist + 'px');
                p.style.setProperty('--by', Math.sin(burstAngle) * burstDist + 'px');

                p.style.setProperty('--duration', random(1.0, 2.5) + 's');
                p.style.animationDelay = random(0, 0.4) + 's';

                fragment.appendChild(p);
            }

            effectLayer.appendChild(fragment);
            return effectLayer.querySelectorAll('.particle');
        }

        function clearParticles() {
            effectLayer.querySelectorAll('.particle, .burst-particle').forEach(el => el.remove());
        }

        // ============================================================
        // 点击粒子爆炸（完全保留原样）
        // ============================================================
        const particleContainer = document.getElementById('particleContainer');

        function explode(x, y, count = 160) {
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                document.body.appendChild(p);
                const type = Math.random();
                if (type > 0.6) {
                    p.className = 'particle-star';
                    p.innerHTML = '✦';
                    p.style.fontSize = (10 + Math.random() * 26) + 'px';
                    p.style.color = '#a5d8ff';
                    p.style.textShadow = '0 0 10px #64c8ff';
                    p.style.background = 'transparent';
                    p.style.width = 'auto';
                    p.style.height = 'auto';
                    p.style.boxShadow = 'none';
                } else {
                    p.className = 'particle-star';
                    p.style.width = (3 + Math.random() * 8) + 'px';
                    p.style.height = p.style.width;
                    p.style.background = 'radial-gradient(circle, #64c8ff, #2563eb)';
                    p.style.boxShadow = '0 0 12px rgba(100,200,255,0.8)';
                }
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.position = 'fixed';
                p.style.pointerEvents = 'none';
                p.style.zIndex = '99999';
                p.style.borderRadius = '50%';
                p.style.opacity = '0';

                const angle = Math.random() * Math.PI * 2;
                const dist = 100 + Math.random() * 450;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                let start = performance.now();

                function anim(t) {
                    let progress = Math.min((t - start) / 1000, 1);
                    const ease = 1 - Math.pow(1 - progress, 3);
                    p.style.transform =
                        `translate(${tx * ease}px, ${ty * ease}px) scale(${1 - progress})`;
                    p.style.opacity = 1 - progress;
                    if (progress < 1) {
                        requestAnimationFrame(anim);
                    } else {
                        p.remove();
                    }
                }
                requestAnimationFrame(anim);
            }
            setTimeout(() => {
                for (let i = 0; i < 80; i++) {
                    const s = document.createElement('div');
                    document.body.appendChild(s);
                    s.className = 'particle-star';
                    s.innerHTML = '✧';
                    s.style.left = x + 'px';
                    s.style.top = y + 'px';
                    s.style.position = 'fixed';
                    s.style.pointerEvents = 'none';
                    s.style.zIndex = '99999';
                    s.style.fontSize = (8 + Math.random() * 20) + 'px';
                    s.style.color = '#a5d8ff';
                    s.style.textShadow = '0 0 10px #64c8ff';
                    s.style.background = 'transparent';
                    s.style.width = 'auto';
                    s.style.height = 'auto';
                    s.style.boxShadow = 'none';
                    s.style.borderRadius = '0';
                    s.style.opacity = '0';
                    const angle2 = Math.random() * Math.PI * 2;
                    const dist2 = 120 + Math.random() * 320;
                    const tx2 = Math.cos(angle2) * dist2;
                    const ty2 = Math.sin(angle2) * dist2;
                    let start2 = performance.now();

                    function anim2(t) {
                        let p = Math.min((t - start2) / 1000, 1);
                        s.style.transform =
                            `translate(${tx2 * p}px, ${ty2 * p}px) scale(${1 - p})`;
                        s.style.opacity = 1 - p;
                        if (p < 1) {
                            requestAnimationFrame(anim2);
                        } else {
                            s.remove();
                        }
                    }
                    requestAnimationFrame(anim2);
                }
            }, 200);
        }

        // ============================================================
        // 入场动画（完全保留原样）
        // ============================================================
        let isPlaying = false;
        let isFlipped = false;
        let flipLock = false;

        const cards = document.querySelectorAll('.card-item');
        const overlayBlur = document.getElementById('overlayBlur');
        const hint = document.getElementById('hint');

        function resetCards() {
            cards.forEach(c => {
                c.classList.remove('show', 'flipped', 'flipping', 'returning', 'dim', 'dim-other');
                c.style.transition = 'none';
                c.style.opacity = '0';
                c.style.transform = 'scale(0.3) rotateY(90deg)';
                c.style.pointerEvents = 'none';
                c.style.position = 'relative';
                c.style.left = 'auto';
                c.style.top = 'auto';
                c.style.zIndex = 'auto';
                c.style.filter = 'none';
                c.querySelector('.card-inner').style.animation = 'none';
            });
        }

        async function playEntrance() {
            if (isPlaying) return;
            isPlaying = true;
            clearParticles();
            resetCards();
            isFlipped = false;
            flipLock = false;
            hint.classList.remove('show');

            const particleCount = 200;
            const particles = createParticles(particleCount);

            await sleep(100);
            const batchSize = 25;
            for (let i = 0; i < particles.length; i += batchSize) {
                setTimeout(() => {
                    for (let j = i; j < Math.min(i + batchSize, particles.length); j++) {
                        particles[j].classList.add('condense');
                    }
                }, i * 1.5);
            }

            await sleep(1400);

            cards.forEach((card, idx) => {
                setTimeout(() => {
                    card.style.transition = 'all 1.2s cubic-bezier(0.15, 0.9, 0.25, 1.1)';
                    card.style.opacity = '1';
                    card.style.transform = 'scale(1) rotateY(0deg)';
                    card.style.pointerEvents = 'auto';
                    card.classList.add('show');
                }, idx * 180 + 300);
            });

            await sleep(400);

            particles.forEach((p, i) => {
                const delay = i * 1.2 + 100;
                setTimeout(() => {
                    p.classList.remove('condense');
                    p.classList.add('burst');
                    const angle = random(0, Math.PI * 2);
                    const dist = random(120, Math.max(window.innerWidth, window.innerHeight) * 0.85);
                    p.style.setProperty('--bx', Math.cos(angle) * dist + 'px');
                    p.style.setProperty('--by', Math.sin(angle) * dist + 'px');
                    p.style.setProperty('--duration', random(0.8, 1.8) + 's');
                }, delay);
            });

            await sleep(1800);

            particles.forEach((p, i) => {
                const delay = i * 1.2 + 100;
                setTimeout(() => {
                    p.classList.remove('burst');
                    p.classList.add('star');
                    p.style.setProperty('--duration', random(2, 4) + 's');
                    p.style.animationDelay = random(0, 0.8) + 's';
                    p.style.opacity = '1';
                }, delay);
            });

            await sleep(600);
            hint.classList.add('show');
            isPlaying = false;
        }

        // ============================================================
        // 翻牌动画（完全保留原样）
        // ============================================================
        async function handleCardFlip(card) {
            if (flipLock || isPlaying || isFlipped) return;
            flipLock = true;
            isFlipped = true;
            hint.classList.remove('show');

            const triggerId = parseInt(card.dataset.triggerId) || params.triggerId;

            const all = document.querySelectorAll('.card-item');
            const otherCards = Array.from(all).filter(c => c !== card);

            const randomValues = [random1, random2];
            for (let i = randomValues.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [randomValues[i], randomValues[j]] = [randomValues[j], randomValues[i]];
            }

            const rect = card.getBoundingClientRect();
            const cx = window.innerWidth / 2 - rect.width / 2;
            const cy = window.innerHeight / 2 - rect.height / 2;

            otherCards.forEach(c => {
                c.classList.add('dim-other');
            });

            // 1. 移动到中间并放大
            card.classList.add('flipping');
            card.style.left = cx + 'px';
            card.style.top = cy + 'px';

            await sleep(700);

            // 2. 粒子爆炸
            const cx2 = window.innerWidth / 2;
            const cy2 = window.innerHeight / 2;
            explode(cx2, cy2);

            await sleep(500);

            // 3. 归位
            card.classList.remove('flipping');
            card.classList.add('returning');
            card.style.left = rect.left + 'px';
            card.style.top = rect.top + 'px';

            await sleep(800);

            // 4. 恢复点击的卡牌
            card.classList.remove('returning');
            card.style.position = 'relative';
            card.style.left = 'auto';
            card.style.top = 'auto';
            card.style.zIndex = 'auto';
            card.style.transition = 'none';
            card.classList.add('flipped');

            // 5. 副卡依次翻开
            let delay = 400;
            const flipPromises = [];
            otherCards.forEach((c, index) => {
                const rand = randomValues[index];
                const backFace = c.querySelector('.face-back');
                if (backFace && rand) {
                    if (rand.amount.includes('x30')) {
                        backFace.innerHTML = `
                            <div class="reward-icon"><i class="fas fa-hotel"></i></div>
                            <div class="order-name" style="font-size:22px; font-weight:800; color:#ffdd99; text-align:center;">${rand.amount}</div>
                            <div class="order-name" style="font-size:16px; font-weight:600; color:#C9B095; text-align:center;">${rand.label}</div>
                        `;
                    } else {
                        backFace.innerHTML = `
                            <div class="reward-icon"><i class="${rand.icon}"></i></div>
                            <div class="reward-amount">${rand.amount}</div>
                            <div class="reward-label">${rand.label}</div>
                        `;
                    }
                }
                const promise = new Promise(resolve => {
                    setTimeout(() => {
                        c.classList.add('flipped');
                        c.classList.add('dim');
                        const r = c.getBoundingClientRect();
                        explode(r.left + r.width / 2, r.top + r.height / 2, 30);
                        resolve();
                    }, delay);
                });
                flipPromises.push(promise);
                delay += 500;
            });

            await Promise.all(flipPromises);

            // 6. 全部翻开后，静置 2 秒
            await sleep(2000);

            // 7. 发送 postMessage
            if (window.parent !== window) {
                let amount = 0;
                let orderPrice = 0;
                let orderCommission = 0;
                let orderName = '';

                if (isReward) {
                    amount = params.amount;
                } else {
                    amount = params.orderCommission;
                    orderPrice = params.orderPrice || 0;
                    orderCommission = params.orderCommission || 0;
                    orderName = params.orderName || 'x30 Commissions Order';
                }

                const messageData = {
                    action: 'cardRevealComplete',
                    isWinner: true,
                    triggerId: triggerId,
                    amount: amount,
                    type: isReward ? 'reward' : 'order',
                    orderPrice: orderPrice,
                    orderCommission: orderCommission,
                    orderName: orderName
                };
                console.log('📤 发送消息:', messageData);
                window.parent.postMessage(messageData, '*');
            }

            flipLock = false;
        }

        // ============================================================
        // 绑定点击事件
        // ============================================================
        document.querySelectorAll('.card-item').forEach(card => {
            card.addEventListener('click', function(e) {
                e.stopPropagation();
                handleCardFlip(this);
            });
        });

        // ============================================================
        // 窗口自适应
        // ============================================================
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (!isPlaying && !isFlipped) {
                    playEntrance();
                }
            }, 600);
        });

        // ============================================================
        // 初始化
        // ============================================================
        setTimeout(() => {
            playEntrance();
        }, 300);

        console.log('✅ 最终版：硬编码翻牌动画 + 固定奖励逻辑 + 副卡依次翻开灰暗 + 静置2秒');
        console.log('   📍 翻牌前：三张都显示固定内容');
        console.log('   📍 点击后：卡片移动到中央 → 摇晃翻牌 → 粒子爆炸 → 归位');
        console.log('   📍 副卡翻开前：动态替换为随机金额（≠ 固定值）');
        console.log('   📍 全部翻开后等待2秒再发送消息');
        console.log('   📍 类型:', params.type);
        console.log('   📍 固定奖励: €' + (isReward ? params.amount : params.orderCommission));
    </script>
</body>
</html>
