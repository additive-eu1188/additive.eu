<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ADDITIVE - Start</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="user-data.js"></script>
    <script src="toast.js"></script>
    <style>
        /* ===== 原有样式全部保留，省略重复（与用户现有版本一致） ===== */
        /* 但为了完整性，这里仅展示新增/修改的卡牌相关样式 */
        /* 实际上，用户已有样式，无需改动，仅确保 .clone-card 存在 */
        .clone-card {
            position: fixed !important;
            z-index: 99999 !important;
            pointer-events: none !important;
            margin: 0 !important;
            width: 160px !important;
            min-height: 220px !important;
            perspective: 2000px !important;
            border-radius: 24px !important;
            transition: none !important;
        }
        .clone-card .face {
            border-radius: 24px !important;
        }
        /* 其他样式已在用户版本中定义，不再重复 */
    </style>
</head>
<body>
    <!-- ===== 页面结构、菜单、视频、余额等全部保留，与用户现有版本完全一致 ===== -->
    <!-- 此处省略，因为用户已有完整页面，只需替换 <script> 中的相关函数 -->

    <script>
        // ============================================================
        // 原有函数（getCurrentUser, sb, toast 等）保持不变
        // 这里只替换 showCardRewardModal 和 showCardOrderModal
        // ============================================================

        // ---------- 粒子系统（保持不变） ----------
        var particleContainer = document.getElementById('particleContainer');

        function boom(cx, cy, count) {
            count = count || 120;
            for (var i = 0; i < count; i++) {
                var el = document.createElement('div');
                var type = Math.random();
                if (type < 0.55) {
                    el.className = 'particle glow-blue';
                    var size = 3 + Math.random() * 10;
                    el.style.width = size + 'px';
                    el.style.height = size + 'px';
                    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                } else if (type < 0.85) {
                    el.className = 'particle star';
                    el.textContent = ['✦', '✧', '✦', '★'][Math.floor(Math.random() * 4)];
                    el.style.fontSize = (12 + Math.random() * 22) + 'px';
                } else {
                    el.className = 'particle sparkle';
                    var size2 = 2 + Math.random() * 6;
                    el.style.width = size2 + 'px';
                    el.style.height = size2 + 'px';
                }
                var angle = Math.random() * 6.2832;
                var distance = 80 + Math.random() * 350;
                var tx = Math.cos(angle) * distance;
                var ty = Math.sin(angle) * distance - 60;
                el.style.left = cx + 'px';
                el.style.top = cy + 'px';
                el.style.opacity = '0';
                particleContainer.appendChild(el);
                var duration = 1200 + Math.random() * 900;
                var delay = Math.random() * 300;
                el.animate([
                    { transform: 'translate(0,0) scale(0.3)', opacity: 0 },
                    { transform: 'translate(' + (tx * 0.3) + 'px, ' + (ty * 0.3) + 'px) scale(1.3)', opacity: 1, offset: 0.2 },
                    { transform: 'translate(' + tx + 'px, ' + ty + 'px) scale(0.6)', opacity: 0 }
                ], {
                    duration: duration,
                    delay: delay,
                    easing: 'cubic-bezier(0.19,1,0.22,1)'
                });
                setTimeout(function() { if (el.parentNode) el.remove(); }, duration + delay + 100);
            }
            // 第二波
            setTimeout(function() {
                for (var j = 0; j < 60; j++) {
                    var s = document.createElement('div');
                    document.body.appendChild(s);
                    s.className = 'particle star';
                    s.innerHTML = '✧';
                    s.style.left = cx + 'px';
                    s.style.top = cy + 'px';
                    s.style.fontSize = (8 + Math.random() * 20) + 'px';
                    var a2 = Math.random() * 6.2832;
                    var d2 = 100 + Math.random() * 300;
                    var tx2 = Math.cos(a2) * d2;
                    var ty2 = Math.sin(a2) * d2;
                    var start2 = performance.now();
                    (function(el, tx, ty) {
                        function anim2(t) {
                            var p = Math.min((t - start2) / 1000, 1);
                            el.style.transform = 'translate(' + (tx * p) + 'px, ' + (ty * p) + 'px) scale(' + (1 - p) + ')';
                            el.style.opacity = 1 - p;
                            if (p < 1) requestAnimationFrame(anim2);
                            else el.remove();
                        }
                        requestAnimationFrame(anim2);
                    })(s, tx2, ty2);
                }
            }, 200);
        }

        var surroundInterval = null;

        function startSurround(cx, cy) {
            if (surroundInterval) clearInterval(surroundInterval);
            var count = 0;

            function spawn() {
                if (count > 30) return;
                var el = document.createElement('div');
                var isStar = Math.random() > 0.6;
                if (isStar) {
                    el.className = 'particle star';
                    el.textContent = ['✦', '✧', '✦', '★'][Math.floor(Math.random() * 4)];
                    el.style.fontSize = (10 + Math.random() * 18) + 'px';
                } else {
                    el.className = 'particle glow-blue';
                    var size = 2 + Math.random() * 7;
                    el.style.width = size + 'px';
                    el.style.height = size + 'px';
                    el.style.borderRadius = '50%';
                }
                var angle = Math.random() * 6.2832;
                var dist = 40 + Math.random() * 100;
                el.style.left = cx + Math.cos(angle) * dist + 'px';
                el.style.top = cy + Math.sin(angle) * dist + 'px';
                el.style.opacity = 0.5 + Math.random() * 0.4;
                particleContainer.appendChild(el);

                var duration = 1800 + Math.random() * 1200;
                var startTime = performance.now();
                var phase = Math.random() * 6.2832;
                var speed = 0.015 + Math.random() * 0.025;

                function animate(time) {
                    var elapsed = time - startTime;
                    if (elapsed > duration) { if (el.parentNode) el.remove(); return; }
                    var progress = elapsed / duration;
                    var ease = 1 - Math.pow(1 - progress, 2);
                    var x = Math.sin(time * speed + phase) * 25 * (1 - ease * 0.5);
                    var y = -ease * 30 + Math.cos(time * speed * 0.7 + phase) * 12;
                    var twinkle = 0.5 + 0.5 * Math.sin(time * 0.03 + phase);
                    el.style.transform = 'translate(' + x + 'px, ' + y + 'px) scale(' + (0.7 + 0.4 * twinkle) + ')';
                    el.style.opacity = (0.4 + 0.5 * twinkle) * (1 - ease * 0.3);
                    requestAnimationFrame(animate);
                }
                requestAnimationFrame(animate);
                count++;
            }

            for (var i = 0; i < 12; i++) { setTimeout(spawn, i * 70); }
            surroundInterval = setInterval(function() { if (count < 25) spawn(); }, 250);
            setTimeout(function() { if (surroundInterval) clearInterval(surroundInterval);
                surroundInterval = null; }, 4500);
        }

        function getPos(el) {
            var r = el.getBoundingClientRect();
            return {
                left: r.left,
                top: r.top,
                width: r.width,
                height: r.height,
                cx: r.left + r.width / 2,
                cy: r.top + r.height / 2,
                rect: r
            };
        }

        // ============================================================
        // 修正后的 showCardRewardModal
        // ============================================================
        var activated = false;
        var overlayBlur = document.getElementById('overlayBlur');

        function showCardRewardModal(rewardAmount, triggerId) {
            var fixedAmount = rewardAmount;
            var randomAmount1 = Math.floor(Math.random() * 190) + 10;
            var randomAmount2 = Math.floor(Math.random() * 190) + 10;

            var cardTypes = [
                { type: 'reward', amount: fixedAmount, triggerId: triggerId, isMain: true, randomAmount: randomAmount1 },
                { type: 'reward', amount: fixedAmount, triggerId: triggerId, isMain: false, randomAmount: randomAmount2 },
                { type: 'reward', amount: fixedAmount, triggerId: triggerId, isMain: false, randomAmount: null }
            ];

            // 打乱顺序
            for (var i = cardTypes.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = cardTypes[i];
                cardTypes[i] = cardTypes[j];
                cardTypes[j] = temp;
            }

            var modal = document.getElementById('cardRewardModal');
            var container = document.getElementById('cardModalContainer');

            var cardsInnerHtml = '';
            for (var ci = 0; ci < cardTypes.length; ci++) {
                var card = cardTypes[ci];
                var dataAttr = 'data-type="' + card.type + '" data-amount="' + card.amount + '" data-trigger-id="' + card
                    .triggerId + '" data-is-main="' + card.isMain + '" data-random-amount="' + (card.randomAmount || 0) +
                    '"';
                cardsInnerHtml += '<div class="card-item-magic" ' + dataAttr +
                    '><div class="face face-front"><i class="fas fa-gem"></i><span>SELECT</span><div class="gem"><i class="fas fa-crown"></i></div></div><div class="face face-back"><div class="reward-icon"><i class="fas fa-gift"></i></div><div class="reward-amount">€' +
                    card.amount.toFixed(2) + '</div><div class="reward-label">✨ Cash Reward</div></div></div>';
            }

            container.innerHTML =
                '<div class="cards-panel-magic magic-rune-animation"><div class="cards-title-magic"><i class="fas fa-gem"></i> Diamond Bonus</div><div class="cards-subtitle-magic">Select one to redeem</div><div class="cards-grid-magic">' +
                cardsInnerHtml + '</div></div>';

            modal.classList.add('active');

            // 绑定点击事件
            var allCards = document.querySelectorAll('#cardRewardModal .card-item-magic');
            var winIdx = 2; // 中奖卡索引（固定为第三张，但顺序已打乱）

            allCards.forEach(function(card, idx) {
                card.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (activated) return;
                    activated = true;

                    var isWinner = (idx === winIdx);
                    var pos = getPos(card);
                    var vw = window.innerWidth;
                    var vh = window.innerHeight;

                    // 1. 背景变暗，其他卡变暗
                    overlayBlur.classList.add('active');
                    allCards.forEach(function(c) { if (c !== card) c.classList.add('dim'); });

                    // 2. 创建克隆体
                    var clone = card.cloneNode(true);
                    clone.classList.add('clone-card');
                    clone.classList.remove('dim');
                    clone.style.left = pos.rect.left + 'px';
                    clone.style.top = pos.rect.top + 'px';
                    clone.style.width = pos.width + 'px';
                    clone.style.height = pos.height + 'px';
                    document.body.appendChild(clone);

                    // 隐藏原始卡牌
                    card.style.opacity = '0';
                    card.style.pointerEvents = 'none';

                    // 3. 飞向中心 + 放大
                    var cx = (vw - pos.width) / 2;
                    var cy = (vh - pos.height) / 2;
                    var start = performance.now();

                    function moveStep(time) {
                        var p = Math.min((time - start) / 800, 1);
                        var ease = 1 - Math.pow(1 - p, 3);
                        var x = pos.left + (cx - pos.left) * ease;
                        var y = pos.top + (cy - pos.top) * ease;
                        var scale = 1 + ease * 0.8;
                        clone.style.transform = 'translate(' + (x - pos.left) + 'px, ' + (y - pos.top) + 'px) scale(' +
                            scale + ')';
                        clone.style.borderRadius = (24 + ease * 8) + 'px';
                        if (p < 1) {
                            requestAnimationFrame(moveStep);
                        } else {
                            // 4. 粒子围绕
                            startSurround(vw / 2, vh / 2);
                            // 5. 粒子爆炸 + 翻转
                            setTimeout(function() {
                                boom(vw / 2, vh / 2, 160);
                                // 翻转克隆体
                                clone.style.transition = 'transform 0.5s cubic-bezier(0.19,1,0.22,1)';
                                clone.style.transform = 'translate(' + (cx - pos.left) + 'px, ' + (cy - pos
                                    .top) + 'px) scale(2.2) rotateY(180deg)';
                                clone.style.borderRadius = '32px';
                                // 标记样式
                                if (isWinner) {
                                    clone.classList.add('reward-active');
                                } else {
                                    clone.classList.add('expired');
                                }
                                clone.classList.add('glow');

                                // 额外粒子
                                setTimeout(function() { boom(vw / 2, vh / 2, 80); }, 300);
                                setTimeout(function() {
                                    boom(vw / 2 - 100, vh / 2 - 100, 50);
                                    boom(vw / 2 + 100, vh / 2 + 100, 50);
                                }, 700);

                                // 6. 归位 + 移除蒙层
                                setTimeout(function() {
                                    overlayBlur.classList.remove('active');
                                    clone.style.transition = 'transform 0.6s cubic-bezier(0.19,1,0.22,1)';
                                    clone.style.transform = 'translate(0px, 0px) scale(1) rotateY(180deg)';
                                    clone.style.borderRadius = '24px';
                                    clone.classList.remove('glow');

                                    setTimeout(function() {
                                        // 移除克隆体
                                        clone.remove();
                                        // 恢复原始卡牌并翻转
                                        card.style.opacity = '1';
                                        card.style.pointerEvents = 'auto';
                                        card.classList.add('flipped');
                                        if (isWinner) {
                                            card.classList.add('reward-active');
                                            // 领取奖励
                                            var tid = parseInt(card.dataset.triggerId);
                                            var amt = parseFloat(card.dataset.amount);
                                            claimCardReward(tid, amt);
                                        } else {
                                            card.classList.add('expired');
                                        }
                                        card.classList.remove('dim');

                                        // 7. 另外两张依次翻开
                                        var delay = 400;
                                        allCards.forEach(function(c) {
                                            if (c !== card) {
                                                setTimeout(function() {
                                                    c.classList.add('flipped');
                                                    var cIdx = Array.from(allCards)
                                                        .indexOf(c);
                                                    if (cIdx === winIdx) {
                                                        c.classList.add(
                                                        'reward-active');
                                                    } else {
                                                        c.classList.add('expired');
                                                    }
                                                    c.classList.remove('dim');
                                                    var r = c.getBoundingClientRect();
                                                    boom(r.left + r.width / 2, r.top +
                                                        r.height / 2, 25);
                                                }, delay);
                                                delay += 500;
                                            }
                                        });

                                        // 8. 关闭模态框（自动）
                                        setTimeout(function() {
                                            document.getElementById('cardRewardModal')
                                                .classList.remove('active');
                                            activated = false;
                                        }, delay + 400);
                                    }, 700);
                                }, 2500);
                            }, 200);
                        }
                    }
                    requestAnimationFrame(moveStep);
                });
            });
        }

        // ============================================================
        // 修正后的 showCardOrderModal（结构相同，仅卡牌背面内容不同）
        // ============================================================
        function showCardOrderModal(triggerOrder) {
            var orderPrice = triggerOrder.matched_price || 0;
            var commissionAmount = triggerOrder.commission_amount || 0;
            var orderName = triggerOrder.matched_order_name || 'x30 Commissions Order';
            var triggerOrderId = triggerOrder.id;

            var randomContents = [];
            for (var rci = 0; rci < 2; rci++) {
                var isOrder = Math.random() < 0.3;
                if (isOrder) {
                    randomContents.push({ type: 'order', name: 'x30 Commissions Order' });
                } else {
                    randomContents.push({ type: 'reward', amount: Math.floor(Math.random() * 190) + 10 });
                }
            }

            var cardTypes = [
                { type: 'order', price: orderPrice, commission: commissionAmount, name: orderName,
                    triggerId: triggerOrderId, isMain: true, randomContent: randomContents[0] },
                { type: 'order', price: orderPrice, commission: commissionAmount, name: orderName,
                    triggerId: triggerOrderId, isMain: false, randomContent: randomContents[1] },
                { type: 'order', price: orderPrice, commission: commissionAmount, name: orderName,
                    triggerId: triggerOrderId, isMain: false, randomContent: null }
            ];

            // 打乱顺序
            for (var ci2 = cardTypes.length - 1; ci2 > 0; ci2--) {
                var j2 = Math.floor(Math.random() * (ci2 + 1));
                var temp2 = cardTypes[ci2];
                cardTypes[ci2] = cardTypes[j2];
                cardTypes[j2] = temp2;
            }

            var modal = document.getElementById('cardRewardModal');
            var container = document.getElementById('cardModalContainer');

            var cardsInnerHtml = '';
            for (var ci3 = 0; ci3 < cardTypes.length; ci3++) {
                var card = cardTypes[ci3];
                var dataAttr = 'data-type="' + card.type + '" data-price="' + (card.price || 0) + '" data-commission="' + (
                        card.commission || 0) + '" data-name="' + escapeHtml(card.name || 'x30 Commissions Order') +
                    '" data-trigger-id="' + card.triggerId + '" data-is-main="' + card.isMain + '" data-random-type="' + (
                        card.randomContent ? card.randomContent.type : '') + '" data-random-amount="' + (card
                        .randomContent ? card.randomContent.amount || 0 : 0) + '"';
                cardsInnerHtml += '<div class="card-item-magic" ' + dataAttr +
                    '><div class="face face-front"><i class="fas fa-gem"></i><span>SELECT</span><div class="gem"><i class="fas fa-crown"></i></div></div><div class="face face-back"><div class="reward-icon"><i class="fas fa-hotel"></i></div><div class="order-name">' +
                    escapeHtml(card.name || 'x30 Commissions Order') +
                    '</div><div class="order-price">€' + (card.price || 0).toFixed(2) +
                    '</div><div class="order-commission">+€' + (card.commission || 0).toFixed(2) +
                    '</div></div></div>';
            }

            container.innerHTML =
                '<div class="cards-panel-magic magic-rune-animation"><div class="cards-title-magic"><i class="fas fa-ticket-alt"></i> Diamond Bonus</div><div class="cards-subtitle-magic">Select one to redeem</div><div class="cards-grid-magic">' +
                cardsInnerHtml + '</div></div>';

            modal.classList.add('active');

            // 绑定点击事件
            var allCards = document.querySelectorAll('#cardRewardModal .card-item-magic');
            var winIdx = 2;

            allCards.forEach(function(card, idx) {
                card.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (activated) return;
                    activated = true;

                    var isWinner = (idx === winIdx);
                    var pos = getPos(card);
                    var vw = window.innerWidth;
                    var vh = window.innerHeight;

                    overlayBlur.classList.add('active');
                    allCards.forEach(function(c) { if (c !== card) c.classList.add('dim'); });

                    var clone = card.cloneNode(true);
                    clone.classList.add('clone-card');
                    clone.classList.remove('dim');
                    clone.style.left = pos.rect.left + 'px';
                    clone.style.top = pos.rect.top + 'px';
                    clone.style.width = pos.width + 'px';
                    clone.style.height = pos.height + 'px';
                    document.body.appendChild(clone);
                    card.style.opacity = '0';
                    card.style.pointerEvents = 'none';

                    var cx = (vw - pos.width) / 2;
                    var cy = (vh - pos.height) / 2;
                    var start = performance.now();

                    function moveStep(time) {
                        var p = Math.min((time - start) / 800, 1);
                        var ease = 1 - Math.pow(1 - p, 3);
                        var x = pos.left + (cx - pos.left) * ease;
                        var y = pos.top + (cy - pos.top) * ease;
                        var scale = 1 + ease * 0.8;
                        clone.style.transform = 'translate(' + (x - pos.left) + 'px, ' + (y - pos.top) + 'px) scale(' +
                            scale + ')';
                        clone.style.borderRadius = (24 + ease * 8) + 'px';
                        if (p < 1) {
                            requestAnimationFrame(moveStep);
                        } else {
                            startSurround(vw / 2, vh / 2);
                            setTimeout(function() {
                                boom(vw / 2, vh / 2, 160);
                                clone.style.transition = 'transform 0.5s cubic-bezier(0.19,1,0.22,1)';
                                clone.style.transform = 'translate(' + (cx - pos.left) + 'px, ' + (cy - pos
                                    .top) + 'px) scale(2.2) rotateY(180deg)';
                                clone.style.borderRadius = '32px';
                                if (isWinner) {
                                    clone.classList.add('reward-active');
                                    // 标记为 claimed
                                    var tid = parseInt(card.dataset.triggerId);
                                    sb.from('user_trigger_orders').update({
                                        status: 'claimed',
                                        claimed_at: new Date().toISOString()
                                    }).eq('id', tid).then(function() {
                                        showToast('🎉 获得 x30 Commissions 订单资格！',
                                        'success');
                                    });
                                } else {
                                    clone.classList.add('expired');
                                }
                                clone.classList.add('glow');

                                setTimeout(function() { boom(vw / 2, vh / 2, 80); }, 300);
                                setTimeout(function() {
                                    boom(vw / 2 - 100, vh / 2 - 100, 50);
                                    boom(vw / 2 + 100, vh / 2 + 100, 50);
                                }, 700);

                                setTimeout(function() {
                                    overlayBlur.classList.remove('active');
                                    clone.style.transition = 'transform 0.6s cubic-bezier(0.19,1,0.22,1)';
                                    clone.style.transform = 'translate(0px, 0px) scale(1) rotateY(180deg)';
                                    clone.style.borderRadius = '24px';
                                    clone.classList.remove('glow');

                                    setTimeout(function() {
                                        clone.remove();
                                        card.style.opacity = '1';
                                        card.style.pointerEvents = 'auto';
                                        card.classList.add('flipped');
                                        if (isWinner) {
                                            card.classList.add('reward-active');
                                        } else {
                                            card.classList.add('expired');
                                        }
                                        card.classList.remove('dim');

                                        var delay = 400;
                                        allCards.forEach(function(c) {
                                            if (c !== card) {
                                                setTimeout(function() {
                                                    c.classList.add('flipped');
                                                    var cIdx = Array.from(allCards)
                                                        .indexOf(c);
                                                    if (cIdx === winIdx) {
                                                        c.classList.add(
                                                        'reward-active');
                                                    } else {
                                                        c.classList.add('expired');
                                                    }
                                                    c.classList.remove('dim');
                                                    var r = c.getBoundingClientRect();
                                                    boom(r.left + r.width / 2, r.top +
                                                        r.height / 2, 25);
                                                }, delay);
                                                delay += 500;
                                            }
                                        });

                                        setTimeout(function() {
                                            document.getElementById('cardRewardModal')
                                                .classList.remove('active');
                                            activated = false;
                                        }, delay + 400);
                                    }, 700);
                                }, 2500);
                            }, 200);
                        }
                    }
                    requestAnimationFrame(moveStep);
                });
            });
        }

        // ============================================================
        // 其余函数（claimCardReward, submitOrder 等）保持不变
        // ============================================================
        // ...（省略，用户现有版本已有）
        // 注意：确保 claimCardReward 函数存在，若不存在则添加

        // 注意：上面代码中引用了 claimCardReward，需要在页面中定义
        // 若用户版本中没有，在此补充：

        async function claimCardReward(triggerId, amount) {
            var user = getCurrentUser();
            if (!user) return;
            try {
                await sb.from('user_trigger_orders').update({
                    status: 'completed',
                    completed_at: new Date().toISOString()
                }).eq('id', triggerId);
                var userDataResult = await sb.from('users').select('balance').eq('uid', user.uid).single();
                var newBalance = (userDataResult.data?.balance || 0) + amount;
                await sb.from('users').update({ balance: newBalance }).eq('uid', user.uid);
                await sb.from('deposits').insert([{
                    uid: user.uid,
                    username: user.username,
                    amount: amount,
                    type: 'card_reward',
                    description: 'Cash Reward',
                    created_at: new Date().toISOString()
                }]);
                user.balance = newBalance;
                localStorage.setItem('currentUser', JSON.stringify(user));
                currentUserBalance = newBalance;
                await refreshBalanceDisplay();
                await loadUserData();
                showToast('🎉 获得 €' + amount.toFixed(2) + ' 现金奖励！', 'success');
            } catch (e) {
                console.error('领取奖励失败:', e);
            }
        }

        // 其余函数（openOrderModal, submitOrder 等）用户已有，无需改动。

        console.log('✅ 卡牌动画修复完成：翻转、粒子爆炸、自动关闭均已正常');
    </script>
