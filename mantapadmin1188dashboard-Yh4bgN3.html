    <!-- 🔐 管理员登录验证 - 放在所有 script 的最前面                   -->
    <!-- ============================================================ -->
    <script>
        (function() {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            const loginTime = parseInt(localStorage.getItem('admin_login_time') || '0');
            const isExpired = (Date.now() - loginTime) > 24 * 60 * 60 * 1000;
            
            if (!isLoggedIn || isExpired) {
                localStorage.removeItem('admin_logged_in');
                localStorage.removeItem('admin_login_time');
                localStorage.removeItem('admin_username');
                window.location.href = 'mantapadmin1188login-Dt6Fd2s.html';
                return;
            }
            console.log('✅ Admin logged in:', localStorage.getItem('admin_username') || 'admin');
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="admin-common.css">
    <style>
        /* 确保琥珀色通知样式存在 */
        @keyframes slideIn {
            0% { transform: translateX(calc(100% + 20px)); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(calc(100% + 20px)); opacity: 0; }
        }
        @keyframes toastProgress {
            0% { width: 100%; }
            100% { width: 0%; }
        }
        
        /* Email Verification 表格样式 */
        .email-request-item {
            background: #0f172a;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .email-request-item .email-info {
            flex: 2;
        }
        .email-request-item .email-address {
            font-size: 14px;
            font-weight: 600;
            color: #ffb84d;
        }
        .email-request-item .request-time {
            font-size: 11px;
            color: #8a9abb;
            margin-top: 4px;
        }
        .email-request-item .code-input {
            width: 120px;
            background: #1e2a3a;
            border: 1px solid #4a7cff;
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            text-align: center;
            font-size: 16px;
            letter-spacing: 2px;
        }
        .email-request-item .set-code-btn {
            background: #2f6b3a;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        .email-request-item .set-code-btn:hover {
            background: #3a8a4a;
        }
        .email-request-item .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
        }
        .status-pending { background: rgba(255,184,77,0.15); color: #ffb84d; }
        .status-verified { background: rgba(46,209,90,0.15); color: #2ed15a; }

        /* 快速卡片样式 */
        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        .quick-card {
            background: linear-gradient(135deg, rgba(74,124,255,0.1), rgba(74,124,255,0.02));
            border: 1px solid rgba(74,124,255,0.2);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .quick-card:hover {
            transform: translateY(-3px);
            border-color: #4a7cff;
            background: rgba(74,124,255,0.15);
        }

        .quick-card i {
            font-size: 28px;
            color: #4a7cff;
            margin-bottom: 12px;
            display: block;
        }

        .quick-card .count {
            font-size: 28px;
            font-weight: 700;
            margin: 8px 0;
            color: #ffdd99;
        }

        .quick-card .label {
            font-size: 13px;
            color: #8a9abb;
        }
    </style>
</head>

<div id="addUserModal" class="modal-overlay">
    <div class="modal-card">
        <h3><i class="fas fa-user-plus"></i> 创建新用户</h3>
        <input type="text" id="newPhone" placeholder="手机号" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">
        <input type="text" id="newUsername" placeholder="用户名" style="width:100%; margin:10px 0; padding:12px; background:#0f172a; border:1px solid #1e2a3a; border-radius:12px; color:#fff;">

<script>
    // 导航点击事件
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const page = item.getAttribute('data-page');
            if (page) showPage(page);
        });
    });
    
    // 退出登录 - 使用 .footer-item
    document.querySelector('.footer-item')?.addEventListener('click', () => { 
        localStorage.removeItem('admin_logged_in');
        localStorage.removeItem('admin_login_time');
        localStorage.removeItem('admin_username');
        window.location.href = 'mantapadmin1188login-Dt6Fd2s.html'; 
    });
    
    // 加载默认页面
    showPage('dashboard');
</script>
