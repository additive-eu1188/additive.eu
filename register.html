<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ADDITIVE - Register</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .register-container { width: 100%; padding: 20px; position: relative; z-index: 1; }
        .register-card {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            padding: 48px 40px;
            background: rgba(8, 10, 26, 0.55);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(204, 178, 153, 0.1);
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), 0 0 40px rgba(204, 178, 153, 0.03);
            position: relative;
        }
        .register-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(204, 178, 153, 0.15), transparent 50%, rgba(204, 178, 153, 0.05));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .register-card .logo {
            text-align: center;
            margin-bottom: 4px;
        }
        .register-card .logo img {
            height: 42px;
            width: auto;
        }
        .register-card .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            letter-spacing: 1px;
            margin-bottom: 32px;
            font-weight: 400;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 6px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .form-group label i { margin-right: 6px; }
        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 13px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: rgba(204, 178, 153, 0.25);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(204, 178, 153, 0.03);
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }

        /* ===== Verification Code 缩短 ===== */
        #regCode {
            max-width: 200px;
            width: 100%;
        }

        /* ===== Phone with country code - 金色渐变背景样式 ===== */
        .phone-group {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        /* ===== 自定义下拉容器 ===== */
        .custom-select-wrapper {
            position: relative;
            flex: 0 0 120px;
            min-width: 120px;
        }

        /* ===== 选中的显示框 ===== */
        .custom-select-wrapper .selected-display {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 13px 10px 13px 14px;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            transition: all 0.25s ease;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            position: relative;
            background: rgba(204, 178, 153, 0.04);
            border: 1px solid rgba(204, 178, 153, 0.1);
            height: 100%;
        }
        .custom-select-wrapper .selected-display:hover {
            border-color: rgba(204, 178, 153, 0.2);
        }
        .custom-select-wrapper .selected-display .arrow {
            margin-left: auto;
            transition: transform 0.3s ease;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }
        .custom-select-wrapper .selected-display .arrow.open {
            transform: rotate(180deg);
        }
        .custom-select-wrapper .selected-display .sel-flag {
            font-size: 18px;
        }
        .custom-select-wrapper .selected-display .sel-code {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            font-size: 13px;
        }

        /* ===== 下拉选项列表 - 金色渐变背景 ===== */
        .custom-select-wrapper .dropdown-options {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            border-radius: 12px;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-6px) scale(0.98);
            transition: all 0.25s ease;
            z-index: 100;
            max-height: 0;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            background: linear-gradient(160deg, rgba(18, 14, 10, 0.98), rgba(8, 6, 12, 0.98));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(204, 178, 153, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(204, 178, 153, 0.03);
        }
        .custom-select-wrapper .dropdown-options.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
            max-height: 260px;
        }
        .custom-select-wrapper .dropdown-options .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
            color: #e8e8f0;
            border-bottom: 1px solid rgba(204, 178, 153, 0.03);
        }
        .custom-select-wrapper .dropdown-options .option-item:last-child {
            border-bottom: none;
        }
        .custom-select-wrapper .dropdown-options .option-item .opt-flag {
            font-size: 18px;
        }
        .custom-select-wrapper .dropdown-options .option-item .opt-code {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
            font-size: 13px;
            margin-left: auto;
        }
        .custom-select-wrapper .dropdown-options .option-item:hover {
            background: rgba(204, 178, 153, 0.06);
            color: #C9B095;
        }
        .custom-select-wrapper .dropdown-options .option-item.selected-opt {
            background: linear-gradient(90deg, rgba(204, 178, 153, 0.1), transparent);
            color: #C9B095;
        }

        /* ===== 手机号输入框 ===== */
        .phone-group .phone-input {
            flex: 1;
            min-width: 0;
        }
        .phone-group .phone-input input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 13px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            height: 100%;
        }
        .phone-group .phone-input input:focus {
            border-color: rgba(204, 178, 153, 0.25);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(204, 178, 153, 0.03);
        }
        .phone-group .phone-input input::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }

        .code-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .code-row input {
            flex: 2;
            min-width: 0;
        }
        .send-code-btn {
            flex: 0 0 auto;
            background: rgba(204, 178, 153, 0.08);
            border: 1px solid rgba(204, 178, 153, 0.12);
            border-radius: 12px;
            padding: 13px 20px;
            color: #C9B095;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            text-align: center;
        }
        .send-code-btn:hover:not(:disabled) {
            background: rgba(204, 178, 153, 0.16);
        }
        .send-code-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .register-btn {
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(204, 178, 153, 0.15), rgba(204, 178, 153, 0.05));
            color: #C9B095;
            border: 1px solid rgba(204, 178, 153, 0.12);
        }
        .register-btn:hover {
            background: linear-gradient(135deg, rgba(204, 178, 153, 0.25), rgba(204, 178, 153, 0.1));
            transform: scale(1.01);
            box-shadow: 0 0 30px rgba(204, 178, 153, 0.05);
        }
        .login-link {
            text-align: center;
            margin-top: 22px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
        }
        .login-link a {
            color: #C9B095;
            text-decoration: none;
            transition: 0.2s;
        }
        .login-link a:hover { color: #d4c0a8; }
        .error-message { text-align: center; margin-top: 16px; font-size: 13px; min-height: 40px; }
        .success-message { text-align: center; margin-top: 16px; font-size: 13px; color: #4ade80; }

        .waves-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        body {
            position: relative;
            overflow-x: hidden;
            background: radial-gradient(circle at 10% 20%, #0a0f2a, #050814);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ============================================================
                   手机版样式
                   ============================================================ */
        @media (max-width: 600px) {
            .phone-group {
                flex-direction: row;
                gap: 8px;
                flex-wrap: nowrap;
            }
            /* 下拉框缩短 */
            .custom-select-wrapper {
                flex: 0 0 80px;
                min-width: 80px;
            }
            .custom-select-wrapper .selected-display {
                padding: 13px 6px 13px 10px;
                font-size: 13px;
                min-height: 50px;
            }
            /* 下拉选项列表加宽 */
            .custom-select-wrapper .dropdown-options {
                min-width: 260px;
                right: auto;
                left: 0;
            }
            .custom-select-wrapper .dropdown-options .option-item {
                padding: 10px 12px;
                font-size: 13px;
            }
            .phone-group .phone-input {
                flex: 1;
                min-width: 0;
            }
            .phone-group .phone-input input {
                padding: 13px 14px;
                font-size: 14px;
                min-height: 50px;
            }
        }

        @media (max-width: 480px) {
            .register-card { padding: 32px 24px; }
            .register-card .logo img { height: 34px; }
            .register-card .subtitle { font-size: 12px; }

            .code-row {
                flex-direction: row;
                align-items: center;
                gap: 10px;
            }
            .code-row input {
                flex: 2;
                min-width: 0;
            }
            .send-code-btn {
                flex: 0 0 auto;
                width: auto;
                padding: 13px 16px;
                font-size: 13px;
                white-space: nowrap;
            }
            #regCode {
                max-width: 180px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <canvas id="wavesBg" class="waves-bg"></canvas>

    <div class="register-container">
        <div class="register-card">
            <div class="logo">
                <img src="https://qgmbzdfnwsdosdqphlxk.supabase.co/storage/v1/object/public/logos/additivelogo1.png" alt="ADDITIVE">
            </div>
            <div class="subtitle">Measurable, precise & specialized</div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <div class="code-row">
                    <input type="email" id="regEmail" placeholder="Enter your email">
                    <button class="send-code-btn" id="sendCodeBtn" onclick="sendEmailToBackend()">Send</button>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-key"></i> Verification Code</label>
                <input type="text" id="regCode" placeholder="Enter 6-digit code">
            </div>

            <div class="form-group">
                <label><i class="fas fa-phone"></i> Phone Number</label>
                <div class="phone-group">
                    <!-- ===== 自定义下拉 ===== -->
                    <div class="custom-select-wrapper" id="countrySelectWrapper">
                        <div class="selected-display" id="selectedDisplay">
                            <span class="sel-flag">🇩🇪</span>
                            <span class="sel-code">+49</span>
                            <span class="arrow"><i class="fas fa-chevron-down"></i></span>
                        </div>
                        <div class="dropdown-options" id="dropdownOptions">
                            <div class="option-item selected-opt" data-value="+49" data-flag="🇩🇪">
                                <span class="opt-flag">🇩🇪</span>
                                <span>Germany</span>
                                <span class="opt-code">+49</span>
                            </div>
                            <div class="option-item" data-value="+39" data-flag="🇮🇹">
                                <span class="opt-flag">🇮🇹</span>
                                <span>Italy</span>
                                <span class="opt-code">+39</span>
                            </div>
                            <div class="option-item" data-value="+44" data-flag="🇬🇧">
                                <span class="opt-flag">🇬🇧</span>
                                <span>United Kingdom</span>
                                <span class="opt-code">+44</span>
                            </div>
                        </div>
                    </div>

                    <div class="phone-input">
                        <input type="tel" id="regPhone" placeholder="Enter your phone number">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="regUsername" placeholder="Username (min 3 chars)">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="regPassword" placeholder="Password (min 4 chars)">
            </div>
            <div class="form-group">
                <label><i class="fas fa-qrcode"></i> Invitation Code (optional)</label>
                <input type="text" id="regInviteCode" placeholder="Enter invite code">
            </div>

            <button class="register-btn" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Register</button>
            <div class="login-link">Already have an account? <a href="signin.html">Sign in</a></div>
            <div id="registerError" class="error-message"></div>
        </div>
    </div>

    <script>
        // ===== 自定义下拉逻辑 =====
        document.addEventListener('DOMContentLoaded', function() {
            const wrapper = document.getElementById('countrySelectWrapper');
            const display = document.getElementById('selectedDisplay');
            const options = document.getElementById('dropdownOptions');
            const items = options.querySelectorAll('.option-item');
            let selectedValue = '+49';
            let selectedFlag = '🇩🇪';

            // 从 localStorage 读取上次选中的值
            const savedCountry = localStorage.getItem('selectedCountry');
            if (savedCountry) {
                items.forEach(item => {
                    if (item.dataset.value === savedCountry) {
                        selectOption(item);
                    }
                });
            }

            function selectOption(item) {
                // 移除所有选中状态
                items.forEach(el => el.classList.remove('selected-opt'));
                item.classList.add('selected-opt');

                const value = item.dataset.value;
                const flag = item.dataset.flag;
                selectedValue = value;
                selectedFlag = flag;

                // 更新显示
                display.innerHTML = `
                    <span class="sel-flag">${flag}</span>
                    <span class="sel-code">${value}</span>
                    <span class="arrow"><i class="fas fa-chevron-down"></i></span>
                `;

                // 保存到 localStorage
                localStorage.setItem('selectedCountry', value);

                // 关闭下拉
                options.classList.remove('open');
                display.querySelector('.arrow').classList.remove('open');
            }

            // 点击显示框切换下拉
            display.addEventListener('click', function(e) {
                e.stopPropagation();
                const isOpen = options.classList.contains('open');
                // 关闭所有其他下拉
                document.querySelectorAll('.dropdown-options').forEach(el => {
                    el.classList.remove('open');
                    el.closest('.custom-select-wrapper').querySelector('.arrow')?.classList.remove('open');
                });
                if (!isOpen) {
                    options.classList.add('open');
                    this.querySelector('.arrow').classList.add('open');
                } else {
                    options.classList.remove('open');
                    this.querySelector('.arrow').classList.remove('open');
                }
            });

            // 点击选项
            items.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    selectOption(this);
                });
            });

            // 点击外部关闭
            document.addEventListener('click', function() {
                document.querySelectorAll('.dropdown-options').forEach(el => {
                    el.classList.remove('open');
                    el.closest('.custom-select-wrapper').querySelector('.arrow')?.classList.remove(
                    'open');
                });
            });

            // 暴露获取选中值的方法
            window.getSelectedCountry = function() {
                return selectedValue;
            };
        });

        // ===== 原有注册逻辑 =====
        const SUPABASE_URL = 'https://qgmbzdfnwsdosdqphlxk.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_zsJFjfNUO7NKp8ZH5KrXFQ_WZ8Q2Kym';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let countdown = 0;
        let countdownInterval = null;
        let pendingEmail = null;

        function showMessage(msg, isError = true) {
            const d = document.getElementById('registerError');
            d.innerText = msg;
            d.className = isError ? 'error-message' : 'success-message';
            setTimeout(() => { if (d.innerText === msg) d.innerText = ''; }, 4000);
        }

        async function getUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip || '';
            } catch (e) {
                console.log('IP fetch failed, using fallback:', e);
                try {
                    const response = await fetch('https://api.ip.sb/ip');
                    const ip = await response.text();
                    return ip.trim() || '';
                } catch (e2) {
                    console.log('Fallback IP service also failed:', e2);
                    return '';
                }
            }
        }

        async function sendEmailToBackend() {
            const email = document.getElementById('regEmail').value.trim();

            if (!email) {
                showMessage('Please enter your email address');
                return;
            }
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('Please enter a valid email address');
                return;
            }

            if (countdown > 0) {
                showMessage(`Please wait ${countdown} seconds before trying again`);
                return;
            }

            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                const { data: existingEmail, error: checkError } = await sb
                    .from('users')
                    .select('email')
                    .eq('email', email)
                    .maybeSingle();

                if (checkError) {
                    console.error('Email check failed:', checkError);
                }

                if (existingEmail) {
                    showMessage('Email is already registered');
                    btn.disabled = false;
                    btn.innerHTML = 'Send';
                    return;
                }

                const { error: deleteError } = await sb
                    .from('email_verification_requests')
                    .delete()
                    .eq('email', email)
                    .eq('is_verified', false);

                if (deleteError) {
                    console.error('Delete old records failed:', deleteError);
                }

                const expiresAt = new Date();
                expiresAt.setHours(expiresAt.getHours() + 24);

                const { data: insertData, error: insertError } = await sb
                    .from('email_verification_requests')
                    .insert({
                        email: email,
                        code: null,
                        is_verified: false,
                        requested_at: new Date().toISOString(),
                        expires_at: expiresAt.toISOString()
                    })
                    .select();

                if (insertError) {
                    console.error('Storage failed:', insertError);
                    showMessage('Send failed: ' + insertError.message);
                    btn.disabled = false;
                    btn.innerHTML = 'Send';
                    return;
                }

                console.log('Email submitted successfully:', insertData);
                pendingEmail = email;
                showMessage('Email submitted! Please wait for the admin to send the verification code to your email', false);

                startCountdown(60);

            } catch (err) {
                console.error('Error:', err);
                showMessage('Network error, please try again: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = 'Send';
            }
        }

        function startCountdown(seconds) {
            countdown = seconds;
            const btn = document.getElementById('sendCodeBtn');
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    btn.disabled = false;
                    btn.innerHTML = 'Send';
                } else {
                    btn.innerHTML = `${countdown}s`;
                }
            }, 1000);
        }

        function generateInviteCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        async function handleRegister() {
            const email = document.getElementById('regEmail').value.trim();
            const verifyCode = document.getElementById('regCode').value.trim();
            const countryCode = window.getSelectedCountry ? window.getSelectedCountry() : '+49';
            const phoneNumber = document.getElementById('regPhone').value.trim();
            const phone = countryCode + phoneNumber;
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const inviteCode = document.getElementById('regInviteCode').value.trim();

            if (!email) { showMessage('Please enter your email address'); return; }
            if (!verifyCode || verifyCode.length !== 6) { showMessage('Please enter the 6-digit verification code'); return; }
            if (!phoneNumber) { showMessage('Please enter your phone number'); return; }
            if (!username || username.length < 3) { showMessage('Username must be at least 3 characters'); return; }
            if (!password || password.length < 4) { showMessage('Password must be at least 4 characters'); return; }

            showMessage('Verifying...', false);

            try {
                const { data: requestData, error: requestError } = await sb
                    .from('email_verification_requests')
                    .select('*')
                    .eq('email', email)
                    .eq('code', verifyCode)
                    .eq('is_verified', false)
                    .gt('expires_at', new Date().toISOString())
                    .maybeSingle();

                if (requestError || !requestData) {
                    showMessage('Invalid or expired verification code. Please contact the admin for a valid code.');
                    return;
                }

                showMessage('Creating account...', false);

                const { data: existingUser } = await sb
                    .from('users')
                    .select('username')
                    .eq('username', username)
                    .maybeSingle();

                if (existingUser) {
                    showMessage('Username already exists');
                    return;
                }

                const { data: existingEmail } = await sb
                    .from('users')
                    .select('email')
                    .eq('email', email)
                    .maybeSingle();

                if (existingEmail) {
                    showMessage('Email is already registered');
                    return;
                }

                const { data: maxUidData } = await sb
                    .from('users')
                    .select('uid')
                    .order('uid', { ascending: false })
                    .limit(1);

                let newUid = '100001';
                if (maxUidData && maxUidData.length > 0 && maxUidData[0].uid) {
                    newUid = (parseInt(maxUidData[0].uid) + 1).toString();
                }

                let invitedBy = '';
                let invitedByUsername = '';

                if (inviteCode) {
                    const { data: inviter } = await sb
                        .from('users')
                        .select('uid, username, balance')
                        .eq('invite_code', inviteCode)
                        .maybeSingle();

                    if (inviter) {
                        invitedBy = inviter.uid;
                        invitedByUsername = inviter.username;

                        const newBalance = (inviter.balance || 0) + 10;
                        await sb.from('users').update({ balance: newBalance }).eq('uid', inviter.uid);
                        await sb.from('deposits').insert([{
                            uid: inviter.uid,
                            username: inviter.username,
                            amount: 10,
                            type: 'referral_bonus',
                            created_at: new Date().toISOString()
                        }]);
                        showMessage('Invitation code is valid! Referrer earned €10', false);
                    } else {
                        showMessage('Invalid invitation code, continuing registration', false);
                    }
                }

                const newInviteCode = generateInviteCode();
                const userIp = await getUserIP();
                console.log('User registration IP:', userIp);

                const { error: insertError } = await sb
                    .from('users')
                    .insert([{
                        uid: newUid,
                        email: email,
                        phone: phone,
                        username: username,
                        password: password,
                        balance: 0,
                        trial_bonus_amount: 0,
                        vip_level: 1,
                        invite_code: newInviteCode,
                        invited_by: invitedBy,
                        invited_by_username: invitedByUsername,
                        total_orders: 0,
                        is_active: true,
                        registered_ip: userIp,
                        created_at: new Date().toISOString()
                    }]);

                if (insertError) {
                    console.error('Insert error:', insertError);
                    showMessage('Registration failed: ' + insertError.message);
                    return;
                }

                await sb
                    .from('email_verification_requests')
                    .update({ is_verified: true, verified_at: new Date().toISOString() })
                    .eq('email', email)
                    .eq('code', verifyCode);

                localStorage.setItem('currentUser', JSON.stringify({
                    uid: newUid,
                    username: username,
                    email: email,
                    balance: 0,
                    trialBonusAmount: 0,
                    commissionRate: 0.51,
                    vipLevel: 1,
                    inviteCode: newInviteCode,
                    isLoggedIn: true,
                    loginTime: Date.now()
                }));

                showMessage('Registration successful! Redirecting...', false);
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);

            } catch (err) {
                console.error('Registration error:', err);
                showMessage('Error: ' + err.message);
            }
        }

        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            try {
                const user = JSON.parse(currentUser);
                if (user.isLoggedIn) window.location.href = 'dashboard.html';
            } catch(e) {}
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleRegister();
        });
    </script>

    <script>
        (function() {
            const canvas = document.getElementById('wavesBg');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let width, height;
            let time = 0;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            function animate() {
                time += 0.02;
                ctx.fillStyle = '#0a0f2a';
                ctx.fillRect(0, 0, width, height);

                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    for (let x = 0; x <= width; x += 10) {
                        const y = height * (0.4 + i * 0.2) + Math.sin(x * 0.01 + time * (1 + i * 0.5)) * 30 + Math.cos(x *
                            0.02 + time) * 15;
                        if (x === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.strokeStyle = `rgba(201, 176, 149, ${0.15 - i * 0.03})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            resize();
            animate();
        })();
    </script>
